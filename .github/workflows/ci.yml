name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (short)
        run: go test -short -race ./...

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.sum go.mod

  go-build:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build ./...

  go-lint:
    name: Go lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --new-from-rev=HEAD~1 --timeout=5m

  go-vuln:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

  go-integration-test:
    name: Go integration tests (Postgres + Redis + S3)
    runs-on: ubuntu-latest
    needs: [go-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start services (Postgres, Redis, MinIO)
        run: |
          docker compose -f docker/docker-compose.ci.yml up -d postgres redis minio
          docker compose -f docker/docker-compose.ci.yml up minio-init

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for Postgres..."
          timeout 60 bash -c 'until docker compose -f docker/docker-compose.ci.yml exec -T postgres pg_isready -U gogomail_test; do sleep 2; done'
          echo "Waiting for Redis..."
          timeout 30 bash -c 'until docker compose -f docker/docker-compose.ci.yml exec -T redis redis-cli ping; do sleep 2; done'

      - name: Run integration tests
        run: |
          go test -count=1 -timeout=300s ./...
        env:
          GOGOMAIL_TEST_DATABASE_URL: "postgres://gogomail_test:gogomail_test@localhost:5432/gogomail_test?sslmode=disable"
          GOGOMAIL_TEST_REDIS_ADDR: "localhost:6379"
          GOGOMAIL_TEST_S3_ENDPOINT: "http://localhost:9000"
          GOGOMAIL_TEST_S3_ACCESS_KEY_ID: "minioadmin"
          GOGOMAIL_TEST_S3_SECRET_ACCESS_KEY: "minioadmin"
          GOGOMAIL_TEST_S3_BUCKET: "gogomail-test"
          GOGOMAIL_TEST_S3_REGION: "us-east-1"
          GOGOMAIL_TEST_S3_FORCE_PATH_STYLE: "true"

      - name: Stop services
        if: always()
        run: docker compose -f docker/docker-compose.ci.yml down -v

  docker-image:
    name: Docker build & scan
    runs-on: ubuntu-latest
    needs: [go-test, go-build, go-integration-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: gogomail:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/gogomail-image.tar

      - name: Load image
        run: docker load --input /tmp/gogomail-image.tar

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gogomail:ci-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  console-test:
    name: Admin console lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/console
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: apps/console/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test --passWithNoTests

  webmail-test:
    name: Webmail lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/webmail
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: apps/webmail/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test --passWithNoTests

  webmail-e2e:
    name: Webmail E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [webmail-test]
    defaults:
      run:
        working-directory: apps/webmail
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: apps/webmail/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/webmail/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: Build webmail
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          CI: "1"

      - name: Upload Playwright HTML report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/webmail/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload trace / screenshot artifacts
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/webmail/test-results/
          retention-days: 7
          if-no-files-found: ignore

  console-e2e:
    name: Admin console E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [console-test]
    defaults:
      run:
        working-directory: apps/console
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: apps/console/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/console/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: Build admin console
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          CI: "1"

      - name: Upload Playwright HTML report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-report
          path: apps/console/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload trace / screenshot artifacts
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: console-playwright-test-results
          path: apps/console/test-results/
          retention-days: 7
          if-no-files-found: ignore
