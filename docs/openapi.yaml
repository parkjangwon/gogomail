openapi: 3.1.0
info:
  title: gogomail Backend API
  version: 2026-05-04.backend-release
  description: Backend-only contract for the first gogomail webmail/admin release slice.
servers:
  - url: /api/v1
    description: Mail API
  - url: /admin/v1
    description: Admin API
security:
  - bearerAuth: []
  - apiKeyAuth: []
paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Process liveness probe
      servers:
        - url: /
          description: Service root
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Health"
  /health/ready:
    get:
      operationId: getHealthReady
      summary: Service readiness probe
      servers:
        - url: /
          description: Service root
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Readiness"
        "503":
          $ref: "#/components/responses/Readiness"
  /info:
    get:
      operationId: getServiceInfo
      summary: Service and backend contract metadata
      servers:
        - url: /api/v1
          description: Mail API
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Info"
  /auth/token:
    post:
      operationId: loginUser
      summary: Authenticate a user and issue a JWT token
      security: []
      servers:
        - url: /api/v1
          description: Mail API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                  must_change_password:
                    type: boolean
        default:
          $ref: "#/components/responses/Error"
  /auth/sessions/revoke-all:
    post:
      operationId: revokeAllSessions
      summary: Invalidate all active sessions for the authenticated user
      description: |
        Increments the user's session_version. All existing JWTs issued before
        this call are immediately rejected. The current token remains valid only
        until it expires; new tokens issued after this call will carry the updated
        version and be accepted normally.
      servers:
        - url: /api/v1
          description: Mail API
      responses:
        "204":
          description: All sessions revoked
        default:
          $ref: "#/components/responses/Error"
  /webmail/capabilities:
    get:
      operationId: getWebmailCapabilities
      summary: Discover webmail frontend capabilities and limits
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/WebmailCapabilities"
        default:
          $ref: "#/components/responses/Error"
  /console/capabilities:
    get:
      operationId: getAdminConsoleCapabilities
      summary: Discover admin console capabilities and limits
      servers:
        - url: /admin/v1
          description: Admin API
      security:
        - adminToken: []
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/AdminConsoleCapabilities"
        default:
          $ref: "#/components/responses/Error"
  /folders:
    get:
      operationId: listFolders
      summary: List folders
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/FolderList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createFolder
      summary: Create a user folder
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      requestBody:
        $ref: "#/components/requestBodies/FolderCreate"
      responses:
        "201":
          $ref: "#/components/responses/Folder"
        default:
          $ref: "#/components/responses/Error"
  /folders/{id}:
    patch:
      operationId: renameFolder
      summary: Rename a folder
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      requestBody:
        $ref: "#/components/requestBodies/FolderRename"
      responses:
        "200":
          $ref: "#/components/responses/Folder"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteFolder
      summary: Delete a folder
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /drive/nodes:
    get:
      operationId: listDriveNodes
      summary: List Drive nodes under a parent
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
        - $ref: "#/components/parameters/Limit"
        - name: parent_id
          in: query
          schema:
            type: string
            maxLength: 200
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/DriveNodeStatus"
            default: active
        - name: node_type
          in: query
          schema:
            $ref: "#/components/schemas/DriveNodeType"
          description: Optional Drive node type filter.
        - name: q
          in: query
          schema:
            type: string
            maxLength: 255
          description: Optional case-insensitive Drive node name filter within the selected parent/status scope.
        - name: all_parents
          in: query
          schema:
            type: boolean
            default: false
          description: Search or list across the authenticated user's entire Drive tree. Cannot be combined with parent_id.
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/DriveNodeSort"
            default: name
          description: Drive node ordering. Folders remain grouped before files for each sort mode.
      responses:
        "200":
          $ref: "#/components/responses/DriveNodeList"
        default:
          $ref: "#/components/responses/Error"
  /drive/folders:
    post:
      operationId: createDriveFolder
      summary: Create a Drive folder
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      requestBody:
        $ref: "#/components/requestBodies/DriveFolderCreate"
      responses:
        "201":
          $ref: "#/components/responses/DriveNode"
        default:
          $ref: "#/components/responses/Error"
  /drive/upload-sessions:
    get:
      operationId: listDriveUploadSessions
      summary: List Drive upload sessions
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/DriveUploadSessionStatus"
      responses:
        "200":
          $ref: "#/components/responses/DriveUploadSessionList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createDriveUploadSession
      summary: Create a Drive upload session
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      requestBody:
        $ref: "#/components/requestBodies/DriveUploadSessionCreate"
      responses:
        "201":
          $ref: "#/components/responses/DriveUploadSession"
        default:
          $ref: "#/components/responses/Error"
  /drive/upload-sessions/{id}:
    get:
      operationId: getDriveUploadSession
      summary: Get a Drive upload session
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/DriveUploadSession"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: cancelDriveUploadSession
      summary: Cancel a Drive upload session
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/DriveUploadSession"
        default:
          $ref: "#/components/responses/Error"
  /drive/upload-sessions/{id}/body:
    put:
      operationId: storeDriveUploadSessionBody
      summary: Store a Drive upload session body
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
        - name: X-Content-SHA256
          in: header
          required: false
          schema:
            type: string
            pattern: "^[0-9a-f]{64}$"
      requestBody:
        $ref: "#/components/requestBodies/DriveUploadSessionBody"
      responses:
        "200":
          $ref: "#/components/responses/DriveUploadSession"
        "413":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /drive/upload-sessions/{id}/finalize:
    post:
      operationId: finalizeDriveUploadSession
      summary: Finalize a Drive upload session into file metadata
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "201":
          $ref: "#/components/responses/DriveNode"
        "507":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /drive/files/finalize:
    post:
      operationId: finalizeDriveFileFromObject
      summary: Finalize a staged Drive object into file metadata
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      requestBody:
        $ref: "#/components/requestBodies/DriveFileFinalize"
      responses:
        "201":
          $ref: "#/components/responses/DriveNode"
        "507":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /drive/files/staged/{upload_id}/body:
    put:
      operationId: storeDriveStagedObjectBody
      summary: Store a staged Drive object body
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
            maxLength: 200
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
        - name: storage_backend
          in: query
          required: true
          schema:
            type: string
            maxLength: 64
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          $ref: "#/components/responses/DriveStagedObject"
        default:
          $ref: "#/components/responses/Error"
  /drive/nodes/{id}:
    get:
      operationId: getDriveNode
      summary: Get a Drive node
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/DriveNodeStatus"
            default: active
      responses:
        "200":
          $ref: "#/components/responses/DriveNode"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: permanentlyDeleteDriveNode
      summary: Permanently delete a trashed Drive node
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/DriveDelete"
        default:
          $ref: "#/components/responses/Error"
  /drive/nodes/{id}/download:
    head:
      operationId: headDriveNodeDownload
      summary: Inspect active Drive file download headers
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          description: Drive file metadata headers without a response body.
          headers:
            Content-Disposition:
              description: Attachment filename for the Drive node, including RFC 5987 filename* when needed.
              schema:
                type: string
            Content-Length:
              description: Size in bytes reported by the storage backend for the Drive file object.
              schema:
                type: integer
                format: int64
            Accept-Ranges:
              description: Indicates support for single byte-range Drive downloads.
              schema:
                type: string
                enum: [bytes]
            X-Gogomail-Drive-SHA256:
              description: SHA-256 digest of the complete Drive file object when recorded on the node.
              schema:
                type: string
                pattern: "^[0-9a-f]{64}$"
            Cache-Control:
              description: Drive file downloads are user data and must not be stored by shared caches.
              schema:
                type: string
                enum: [no-store]
            X-Content-Type-Options:
              description: Prevent browser MIME sniffing for Drive file downloads.
              schema:
                type: string
                enum: [nosniff]
        default:
          $ref: "#/components/responses/Error"
    get:
      operationId: downloadDriveNode
      summary: Download an active Drive file
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
        - name: Range
          in: header
          required: false
          description: Optional single byte range, for example `bytes=0-1048575`.
          schema:
            type: string
      responses:
        "200":
          description: Drive file bytes.
          headers:
            Content-Disposition:
              description: Attachment filename for the Drive node, including RFC 5987 filename* when needed.
              schema:
                type: string
            Content-Length:
              description: Full size in bytes reported for the Drive file object.
              schema:
                type: integer
                format: int64
            Accept-Ranges:
              description: Indicates support for single byte-range Drive downloads.
              schema:
                type: string
                enum: [bytes]
            X-Gogomail-Drive-SHA256:
              description: SHA-256 digest of the complete Drive file object when recorded on the node.
              schema:
                type: string
                pattern: "^[0-9a-f]{64}$"
            Cache-Control:
              description: Drive file downloads are user data and must not be stored by shared caches.
              schema:
                type: string
                enum: [no-store]
            X-Content-Type-Options:
              description: Prevent browser MIME sniffing for Drive file downloads.
              schema:
                type: string
                enum: [nosniff]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Requested Drive file byte range.
          headers:
            Content-Disposition:
              description: Attachment filename for the Drive node, including RFC 5987 filename* when needed.
              schema:
                type: string
            Content-Range:
              description: Byte range returned for the Drive file object.
              schema:
                type: string
            Content-Length:
              description: Number of bytes in the partial response.
              schema:
                type: integer
                format: int64
            Accept-Ranges:
              description: Indicates support for single byte-range Drive downloads.
              schema:
                type: string
                enum: [bytes]
            X-Gogomail-Drive-SHA256:
              description: SHA-256 digest of the complete Drive file object when recorded on the node.
              schema:
                type: string
                pattern: "^[0-9a-f]{64}$"
            Cache-Control:
              description: Drive file downloads are user data and must not be stored by shared caches.
              schema:
                type: string
                enum: [no-store]
            X-Content-Type-Options:
              description: Prevent browser MIME sniffing for Drive file downloads.
              schema:
                type: string
                enum: [nosniff]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/Error"
  /drive/usage:
    get:
      operationId: getDriveUsageSummary
      summary: Get current user's Drive usage summary
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/DriveUsageSummary"
        default:
          $ref: "#/components/responses/Error"
  /drive/nodes/{id}/trash:
    post:
      operationId: trashDriveNode
      summary: Move a Drive node tree to trash
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/DriveNodeUpdate"
        default:
          $ref: "#/components/responses/Error"
  /drive/nodes/{id}/restore:
    post:
      operationId: restoreDriveNode
      summary: Restore a trashed Drive node tree
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/DriveNodeUpdate"
        default:
          $ref: "#/components/responses/Error"
  /drive/nodes/{id}/name:
    patch:
      operationId: renameDriveNode
      summary: Rename an active Drive node
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      requestBody:
        $ref: "#/components/requestBodies/DriveNodeRename"
      responses:
        "200":
          $ref: "#/components/responses/DriveNode"
        default:
          $ref: "#/components/responses/Error"
  /drive/nodes/{id}/parent:
    patch:
      operationId: moveDriveNode
      summary: Move an active Drive node to another folder
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      requestBody:
        $ref: "#/components/requestBodies/DriveNodeMove"
      responses:
        "200":
          $ref: "#/components/responses/DriveNode"
        default:
          $ref: "#/components/responses/Error"
  /drive/nodes/{id}/copy:
    post:
      operationId: copyDriveNode
      summary: Copy an active Drive file to another folder
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      requestBody:
        $ref: "#/components/requestBodies/DriveNodeCopy"
      responses:
        "201":
          $ref: "#/components/responses/DriveNode"
        "507":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /drive/nodes/{id}/share-links:
    post:
      operationId: createDriveShareLink
      summary: Create a Drive share link for an active file
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      requestBody:
        $ref: "#/components/requestBodies/DriveShareLinkCreate"
      responses:
        "201":
          $ref: "#/components/responses/DriveShareLink"
        default:
          $ref: "#/components/responses/Error"
  /drive/share-links:
    get:
      operationId: listDriveShareLinks
      summary: List Drive share links for the authenticated user
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
        - $ref: "#/components/parameters/Limit"
        - name: node_id
          in: query
          schema:
            type: string
            maxLength: 200
        - name: status
          in: query
          schema:
            type: string
            enum: [active, revoked]
            default: active
      responses:
        "200":
          $ref: "#/components/responses/DriveShareLinkList"
        default:
          $ref: "#/components/responses/Error"
  /drive/share-links/{id}:
    get:
      operationId: resolveDriveShareLink
      summary: Resolve an active public Drive share link
      servers:
        - url: /api/v1
          description: Mail API
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            maxLength: 256
          description: Raw public Drive share token.
      responses:
        "200":
          $ref: "#/components/responses/DriveSharedFile"
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: revokeDriveShareLink
      summary: Revoke an active Drive share link
      servers:
        - url: /api/v1
          description: Mail API
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/UserIDFallback"
        - $ref: "#/components/parameters/UserEmailFallback"
      responses:
        "200":
          $ref: "#/components/responses/DriveShareLink"
        default:
          $ref: "#/components/responses/Error"
  /drive/share-links/{id}/download:
    head:
      operationId: headDriveSharedFileDownload
      summary: Return public Drive shared-file download headers
      servers:
        - url: /api/v1
          description: Mail API
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            maxLength: 256
          description: Raw public Drive share token.
      responses:
        "200":
          description: Shared Drive file metadata headers without a response body.
          headers:
            Content-Disposition:
              description: Attachment filename for the shared Drive file, including RFC 5987 filename* when needed.
              schema:
                type: string
            Content-Length:
              description: Size in bytes reported by the storage backend for the shared Drive file object.
              schema:
                type: integer
                format: int64
            Accept-Ranges:
              description: Indicates support for single byte-range shared Drive downloads.
              schema:
                type: string
                enum: [bytes]
            X-Gogomail-Drive-SHA256:
              description: SHA-256 digest of the complete shared Drive file object when recorded on the node.
              schema:
                type: string
                pattern: "^[0-9a-f]{64}$"
            Cache-Control:
              description: Shared Drive file downloads are user data and must not be stored by shared caches.
              schema:
                type: string
                enum: [no-store]
            X-Content-Type-Options:
              description: Prevent browser MIME sniffing for shared Drive file downloads.
              schema:
                type: string
                enum: [nosniff]
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
    get:
      operationId: downloadDriveSharedFile
      summary: Download a public Drive shared file
      servers:
        - url: /api/v1
          description: Mail API
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            maxLength: 256
          description: Raw public Drive share token.
        - name: Range
          in: header
          schema:
            type: string
            maxLength: 8192
          description: Optional single HTTP byte range. Multi-range requests are rejected.
      responses:
        "200":
          description: Shared Drive file bytes.
          headers:
            Content-Disposition:
              description: Attachment filename for the shared Drive file, including RFC 5987 filename* when needed.
              schema:
                type: string
            Content-Length:
              description: Full size in bytes reported for the shared Drive file object.
              schema:
                type: integer
                format: int64
            Accept-Ranges:
              description: Indicates support for single byte-range shared Drive downloads.
              schema:
                type: string
                enum: [bytes]
            X-Gogomail-Drive-SHA256:
              description: SHA-256 digest of the complete shared Drive file object when recorded on the node.
              schema:
                type: string
                pattern: "^[0-9a-f]{64}$"
            Cache-Control:
              description: Shared Drive file downloads are user data and must not be stored by shared caches.
              schema:
                type: string
                enum: [no-store]
            X-Content-Type-Options:
              description: Prevent browser MIME sniffing for shared Drive file downloads.
              schema:
                type: string
                enum: [nosniff]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Requested shared Drive file byte range.
          headers:
            Content-Disposition:
              description: Attachment filename for the shared Drive file, including RFC 5987 filename* when needed.
              schema:
                type: string
            Content-Range:
              description: Byte range returned for the shared Drive file object.
              schema:
                type: string
            Content-Length:
              description: Number of bytes in the partial response.
              schema:
                type: integer
                format: int64
            Accept-Ranges:
              description: Indicates support for single byte-range shared Drive downloads.
              schema:
                type: string
                enum: [bytes]
            X-Gogomail-Drive-SHA256:
              description: SHA-256 digest of the complete shared Drive file object when recorded on the node.
              schema:
                type: string
                pattern: "^[0-9a-f]{64}$"
            Cache-Control:
              description: Shared Drive file downloads are user data and must not be stored by shared caches.
              schema:
                type: string
                enum: [no-store]
            X-Content-Type-Options:
              description: Prevent browser MIME sniffing for shared Drive file downloads.
              schema:
                type: string
                enum: [nosniff]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "416":
          description: Requested byte range is invalid or outside the shared Drive file size.
          headers:
            Content-Range:
              description: Unsatisfied shared Drive file byte range with the known complete size.
              schema:
                type: string
                pattern: "^bytes \\*/[0-9]+$"
        "429":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
