openapi: 3.1.0
info:
  title: gogomail Backend API
  version: 2026-05-04.backend-release
  description: Backend-only contract for the first gogomail webmail/admin release slice.
servers:
  - url: /api/v1
    description: Mail API
  - url: /admin/v1
    description: Admin API
security:
  - bearerAuth: []
paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Process liveness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Health"
  /health/ready:
    get:
      operationId: getHealthReady
      summary: Service readiness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Readiness"
  /info:
    get:
      operationId: getServiceInfo
      summary: Service and backend contract metadata
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Info"
  /folders:
    get:
      operationId: listFolders
      summary: List folders
      responses:
        "200":
          $ref: "#/components/responses/FolderList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createFolder
      summary: Create a user folder
      requestBody:
        $ref: "#/components/requestBodies/FolderCreate"
      responses:
        "201":
          $ref: "#/components/responses/Folder"
        default:
          $ref: "#/components/responses/Error"
  /folders/{id}:
    patch:
      operationId: renameFolder
      summary: Rename a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/FolderRename"
      responses:
        "200":
          $ref: "#/components/responses/Folder"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteFolder
      summary: Delete a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages:
    get:
      operationId: listMessages
      summary: List messages with opaque cursor pagination
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: folder_id
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/MessageListPage"
        default:
          $ref: "#/components/responses/Error"
  /search:
    get:
      operationId: searchMessages
      summary: Search messages using the current backend search implementation
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: q
          in: query
          schema:
            type: string
        - name: folder_id
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: subject
          in: query
          schema:
            type: string
        - name: has_attachment
          in: query
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [date, relevance]
            default: date
        - name: include_rank
          in: query
          schema:
            type: boolean
            default: false
        - name: include_highlights
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          $ref: "#/components/responses/MessageList"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}:
    get:
      operationId: getMessage
      summary: Get message detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteMessage
      summary: Soft-delete a message
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/delivery-status:
    get:
      operationId: getMessageDeliveryStatus
      summary: Get user-scoped delivery and bounce status for a sent message
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/MessageDeliveryStatus"
        default:
          $ref: "#/components/responses/Error"
  /threads:
    get:
      operationId: listThreads
      summary: List message threads for the current mailbox
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: principal_id
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 event timestamp lower bound.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive RFC3339 event timestamp upper bound.
      responses:
        "200":
          $ref: "#/components/responses/ThreadList"
        default:
          $ref: "#/components/responses/Error"
  /threads/{id}/messages:
    get:
      operationId: listThreadMessages
      summary: List messages inside a thread in chronological order
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/MessageList"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/flags:
    patch:
      operationId: updateMessageFlags
      summary: Update one message flag
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageFlagUpdate"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/folder:
    patch:
      operationId: moveMessage
      summary: Move one message to a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageMove"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages/bulk/flags:
    patch:
      operationId: bulkUpdateMessageFlags
      summary: Bounded bulk flag update
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageFlagUpdate"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
        default:
          $ref: "#/components/responses/Error"
  /messages/bulk/folder:
    patch:
      operationId: bulkMoveMessages
      summary: Bounded bulk folder move
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageMove"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
        default:
          $ref: "#/components/responses/Error"
  /messages/bulk/delete:
    post:
      operationId: bulkDeleteMessages
      summary: Bounded bulk soft delete
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageDelete"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/attachments:
    get:
      operationId: listMessageAttachments
      summary: List message attachments
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/AttachmentList"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/attachments/{attachment_id}/download:
    get:
      operationId: downloadMessageAttachment
      summary: Download an attachment
      parameters:
        - $ref: "#/components/parameters/PathID"
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachment bytes
        default:
          $ref: "#/components/responses/Error"
  /messages/send:
    post:
      operationId: sendMessage
      summary: Compose and queue a new/reply/forward message
      requestBody:
        $ref: "#/components/requestBodies/ComposeSend"
      responses:
        "202":
          $ref: "#/components/responses/SendQueued"
        default:
          $ref: "#/components/responses/Error"
  /drafts:
    post:
      operationId: saveDraft
      summary: Save or update a draft
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          $ref: "#/components/responses/Draft"
        default:
          $ref: "#/components/responses/Error"
  /drafts/{id}:
    patch:
      operationId: updateDraft
      summary: Update an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          $ref: "#/components/responses/Draft"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteDraft
      summary: Delete a draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /drafts/{id}/send:
    post:
      operationId: sendDraft
      summary: Send an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "202":
          $ref: "#/components/responses/SendQueued"
        default:
          $ref: "#/components/responses/Error"
  /attachments:
    post:
      operationId: reserveAttachment
      summary: Reserve attachment upload metadata
      requestBody:
        $ref: "#/components/requestBodies/AttachmentReserve"
      responses:
        "201":
          $ref: "#/components/responses/Attachment"
        default:
          $ref: "#/components/responses/Error"
  /attachments/upload:
    post:
      operationId: uploadAttachment
      summary: Direct multipart attachment upload
      requestBody:
        $ref: "#/components/requestBodies/AttachmentMultipartUpload"
      responses:
        "201":
          $ref: "#/components/responses/Attachment"
        default:
          $ref: "#/components/responses/Error"
  /push-devices:
    get:
      operationId: listPushDevices
      summary: List user push notification devices
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/PushDeviceList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: upsertPushDevice
      summary: Register or refresh a user push notification device
      requestBody:
        $ref: "#/components/requestBodies/PushDeviceUpsert"
      responses:
        "201":
          $ref: "#/components/responses/PushDevice"
        default:
          $ref: "#/components/responses/Error"
  /push-devices/{id}:
    delete:
      operationId: deletePushDevice
      summary: Delete a user push notification device
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /queue:
    get:
      operationId: getAdminQueueStats
      summary: Admin queue stats
      responses:
        "200":
          $ref: "#/components/responses/QueueStats"
        default:
          $ref: "#/components/responses/Error"
  /backpressure:
    get:
      operationId: getAdminBackpressure
      summary: Admin inspect SMTP backpressure state
      responses:
        "200":
          $ref: "#/components/responses/Backpressure"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateAdminBackpressure
      summary: Admin update SMTP backpressure state
      requestBody:
        $ref: "#/components/requestBodies/BackpressureUpdate"
      responses:
        "200":
          $ref: "#/components/responses/Backpressure"
        default:
          $ref: "#/components/responses/Error"
  /quota-usage:
    get:
      operationId: listAdminQuotaUsage
      summary: Admin domain and user quota usage pressure list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/QuotaUsageList"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/daily:
    get:
      operationId: listAdminAPIUsageDaily
      summary: Admin daily API usage aggregates
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageDailyList"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/monthly:
    get:
      operationId: listAdminAPIUsageMonthly
      summary: Admin monthly API usage aggregates
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageMonthlyList"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/ledger:
    get:
      operationId: listAdminAPIUsageLedger
      summary: Admin immutable API usage ledger events
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageLedgerList"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/ledger/export:
    get:
      operationId: exportAdminAPIUsageLedger
      summary: Export immutable API usage ledger events as NDJSON
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: principal_id
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 event timestamp lower bound.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive RFC3339 event timestamp upper bound.
      responses:
        "200":
          $ref: "#/components/responses/APIUsageLedgerExport"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/ledger/stats:
    get:
      operationId: getAdminAPIUsageLedgerStats
      summary: Admin immutable API usage ledger export statistics
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: principal_id
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 event timestamp lower bound.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive RFC3339 event timestamp upper bound.
      responses:
        "200":
          $ref: "#/components/responses/APIUsageLedgerStats"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches:
    get:
      operationId: listAdminAPIUsageExportBatches
      summary: Admin API usage export batch manifests
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportBatchList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAdminAPIUsageExportBatch
      summary: Create an API usage export batch manifest checkpoint
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: principal_id
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 event timestamp lower bound.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive RFC3339 event timestamp upper bound.
      responses:
        "201":
          $ref: "#/components/responses/APIUsageExportBatch"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}:
    get:
      operationId: getAdminAPIUsageExportBatch
      summary: Admin API usage export batch manifest detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportBatch"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/handoff-readiness:
    get:
      operationId: getAdminAPIUsageExportHandoffReadiness
      summary: Inspect API usage export batch handoff readiness
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deep
          in: query
          required: false
          description: When true, stream and verify registered artifacts and verify the latest manifest digest/signature before returning the report.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportHandoffReadiness"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/export:
    get:
      operationId: exportAdminAPIUsageExportBatch
      summary: Export API usage ledger events from a saved batch manifest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageLedgerExport"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/artifacts:
    get:
      operationId: listAdminAPIUsageExportArtifacts
      summary: List API usage export artifacts for a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportArtifactList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAdminAPIUsageExportArtifact
      summary: Register an external API usage export artifact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APIUsageExportArtifactCreate"
      responses:
        "201":
          $ref: "#/components/responses/APIUsageExportArtifact"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/artifacts/{artifact_id}:
    get:
      operationId: getAdminAPIUsageExportArtifact
      summary: API usage export artifact detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportArtifact"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/artifacts/write:
    post:
      operationId: writeAdminAPIUsageExportArtifact
      summary: Write an API usage export artifact object for a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APIUsageExportArtifactWrite"
      responses:
        "201":
          $ref: "#/components/responses/APIUsageExportArtifact"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/artifacts/{artifact_id}/download:
    get:
      operationId: downloadAdminAPIUsageExportArtifact
      summary: Download a stored API usage export artifact object
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportArtifactDownload"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/artifacts/{artifact_id}/verification:
    get:
      operationId: verifyAdminAPIUsageExportArtifact
      summary: Verify a stored API usage export artifact object
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportArtifactVerification"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/manifest-digests:
    get:
      operationId: listAdminAPIUsageExportManifestDigests
      summary: List canonical API usage export manifest digests for a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportManifestDigestList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAdminAPIUsageExportManifestDigest
      summary: Create a canonical API usage export manifest digest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          $ref: "#/components/responses/APIUsageExportManifestDigest"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/manifest-digests/{digest_id}:
    get:
      operationId: getAdminAPIUsageExportManifestDigest
      summary: API usage export manifest digest detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: digest_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportManifestDigest"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/manifest-digests/{digest_id}/verification:
    get:
      operationId: verifyAdminAPIUsageExportManifestDigest
      summary: Verify a canonical API usage export manifest digest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: digest_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportManifestDigestVerification"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/manifest-digests/{digest_id}/signatures:
    get:
      operationId: listAdminAPIUsageExportManifestSignatures
      summary: List API usage export manifest signatures
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: digest_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportManifestSignatureList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAdminAPIUsageExportManifestSignature
      summary: Sign an API usage export manifest digest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: digest_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          $ref: "#/components/responses/APIUsageExportManifestSignature"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/manifest-digests/{digest_id}/signatures/{signature_id}:
    get:
      operationId: getAdminAPIUsageExportManifestSignature
      summary: API usage export manifest signature detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: digest_id
          in: path
          required: true
          schema:
            type: string
        - name: signature_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportManifestSignature"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/export-batches/{id}/manifest-digests/{digest_id}/signatures/{signature_id}/verification:
    get:
      operationId: verifyAdminAPIUsageExportManifestSignature
      summary: Verify an API usage export manifest signature
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: digest_id
          in: path
          required: true
          schema:
            type: string
        - name: signature_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/APIUsageExportManifestSignatureVerification"
        default:
          $ref: "#/components/responses/Error"
