openapi: 3.1.0
info:
  title: gogomail Backend API
  version: 2026-05-04.backend-release
  description: Backend-only contract for the first gogomail webmail/admin release slice.
servers:
  - url: /api/v1
    description: Mail API
  - url: /admin/v1
    description: Admin API
security:
  - bearerAuth: []
paths:
  /health/live:
    get:
      summary: Process liveness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Health"
  /health/ready:
    get:
      summary: Service readiness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Readiness"
  /info:
    get:
      summary: Service and backend contract metadata
      responses:
        "200":
          $ref: "#/components/responses/Info"
  /folders:
    get:
      summary: List folders
      responses:
        "200":
          $ref: "#/components/responses/FolderList"
    post:
      summary: Create a user folder
      requestBody:
        $ref: "#/components/requestBodies/FolderCreate"
      responses:
        "201":
          $ref: "#/components/responses/Folder"
  /folders/{id}:
    patch:
      summary: Rename a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/FolderRename"
      responses:
        "200":
          $ref: "#/components/responses/Folder"
    delete:
      summary: Delete a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
  /messages:
    get:
      summary: List messages with opaque cursor pagination
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: folder_id
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/MessageListPage"
  /messages/{id}:
    get:
      summary: Get message detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Message"
    delete:
      summary: Soft-delete a message
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
  /messages/{id}/flags:
    patch:
      summary: Update one message flag
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageFlagUpdate"
      responses:
        "200":
          $ref: "#/components/responses/Status"
  /messages/{id}/folder:
    patch:
      summary: Move one message to a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageMove"
      responses:
        "200":
          $ref: "#/components/responses/Status"
  /messages/bulk/flags:
    patch:
      summary: Bounded bulk flag update
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageFlagUpdate"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
  /messages/bulk/folder:
    patch:
      summary: Bounded bulk folder move
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageMove"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
  /messages/bulk/delete:
    post:
      summary: Bounded bulk soft delete
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageDelete"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
  /messages/{id}/attachments:
    get:
      summary: List message attachments
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/AttachmentList"
  /messages/{id}/attachments/{attachment_id}/download:
    get:
      summary: Download an attachment
      parameters:
        - $ref: "#/components/parameters/PathID"
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachment bytes
  /messages/send:
    post:
      summary: Compose and queue a new/reply/forward message
      requestBody:
        $ref: "#/components/requestBodies/ComposeSend"
      responses:
        "202":
          $ref: "#/components/responses/SendQueued"
  /drafts:
    post:
      summary: Save or update a draft
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          $ref: "#/components/responses/Draft"
  /drafts/{id}:
    patch:
      summary: Update an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          $ref: "#/components/responses/Draft"
    delete:
      summary: Delete a draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
  /drafts/{id}/send:
    post:
      summary: Send an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "202":
          $ref: "#/components/responses/SendQueued"
  /attachments:
    post:
      summary: Reserve attachment upload metadata
      requestBody:
        $ref: "#/components/requestBodies/AttachmentReserve"
      responses:
        "201":
          $ref: "#/components/responses/Attachment"
  /attachments/upload:
    post:
      summary: Direct multipart attachment upload
      requestBody:
        $ref: "#/components/requestBodies/AttachmentMultipartUpload"
      responses:
        "201":
          $ref: "#/components/responses/Attachment"
  /queue:
    get:
      summary: Admin queue stats
      responses:
        "200":
          $ref: "#/components/responses/QueueStats"
  /delivery-attempts:
    get:
      summary: Admin delivery attempt list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DeliveryAttempts"
  /suppression-list:
    get:
      summary: Admin suppression list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/SuppressionList"
  /suppression-list/{id}:
    delete:
      summary: Admin remove suppression entry
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
  /dkim-keys:
    get:
      summary: Admin DKIM key list
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: domain_id
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/DKIMKeyList"
    post:
      summary: Admin create DKIM key
      requestBody:
        $ref: "#/components/requestBodies/DKIMKeyCreate"
      responses:
        "201":
          $ref: "#/components/responses/IDStatus"
  /dkim-keys/{id}:
    delete:
      summary: Admin deactivate DKIM key
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
  /outbox/{id}/retry:
    post:
      summary: Admin retry one outbox event
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
  /domains:
    get:
      summary: Admin domain list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DomainList"
    post:
      summary: Admin create domain
      requestBody:
        $ref: "#/components/requestBodies/DomainCreate"
      responses:
        "201":
          $ref: "#/components/responses/Domain"
  /domains/{id}:
    get:
      summary: Admin domain detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Domain"
  /domains/{id}/status:
    patch:
      summary: Admin update domain status
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/StatusUpdate"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
  /domains/{id}/quota:
    patch:
      summary: Admin update domain quota
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/QuotaUpdate"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
  /users:
    get:
      summary: Admin user list
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: domain_id
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/UserList"
    post:
      summary: Admin create user
      requestBody:
        $ref: "#/components/requestBodies/UserCreate"
      responses:
        "201":
          $ref: "#/components/responses/User"
  /users/{id}:
    get:
      summary: Admin user detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/User"
  /users/{id}/status:
    patch:
      summary: Admin update user status
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/StatusUpdate"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
  /users/{id}/quota:
    patch:
      summary: Admin update user quota
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/QuotaUpdate"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
  responses:
    Health:
      description: Process is alive
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthResponse"
    Readiness:
      description: Service is ready or degraded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReadinessResponse"
    Info:
      description: Service and backend contract metadata
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InfoResponse"
    Status:
      description: Stable status envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StatusEnvelope"
    IDStatus:
      description: Stable status envelope with affected resource id
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/IDStatusEnvelope"
    BulkUpdate:
      description: Bulk update count envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkUpdateEnvelope"
    FolderList:
      description: Folder list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderListEnvelope"
    Folder:
      description: Folder resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderEnvelope"
    MessageListPage:
      description: Message list page envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageListPageEnvelope"
    Message:
      description: Message detail envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageEnvelope"
    Draft:
      description: Draft resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DraftEnvelope"
    SendQueued:
      description: Queued send result envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SendQueuedEnvelope"
    AttachmentList:
      description: Attachment list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AttachmentListEnvelope"
    Attachment:
      description: Attachment resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AttachmentEnvelope"
    QueueStats:
      description: Queue stats envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/QueueStatsEnvelope"
    DeliveryAttempts:
      description: Delivery attempts envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeliveryAttemptsEnvelope"
    SuppressionList:
      description: Suppression list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuppressionListEnvelope"
    DKIMKeyList:
      description: DKIM key list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DKIMKeyListEnvelope"
    DomainList:
      description: Domain list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DomainListEnvelope"
    Domain:
      description: Domain resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DomainEnvelope"
    UserList:
      description: User list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserListEnvelope"
    User:
      description: User resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserEnvelope"
  parameters:
    PathID:
      name: id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  requestBodies:
    FolderCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderCreateRequest"
    FolderRename:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderRenameRequest"
    MessageFlagUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageFlagUpdateRequest"
    MessageMove:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageMoveRequest"
    BulkMessageFlagUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkMessageFlagUpdateRequest"
    BulkMessageMove:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkMessageMoveRequest"
    BulkMessageDelete:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkMessageDeleteRequest"
    ComposeSend:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComposeRequest"
    DraftSave:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComposeRequest"
    AttachmentReserve:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AttachmentReserveRequest"
    AttachmentMultipartUpload:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/AttachmentMultipartUploadRequest"
    DomainCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DomainCreateRequest"
    UserCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserCreateRequest"
    StatusUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StatusUpdateRequest"
    QuotaUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/QuotaUpdateRequest"
    DKIMKeyCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DKIMKeyCreateRequest"
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ReadinessCheck:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
        detail:
          type: string
    ReadinessResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok]
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ReadinessCheck"
    InfoResponse:
      type: object
      required: [service, status, api_version, backend_contract_version]
      properties:
        service:
          type: string
          enum: [gogomail]
        status:
          type: string
          enum: [ok]
        api_version:
          type: string
          enum: [v1]
        backend_contract_version:
          type: string
          enum: [2026-05-04.backend-release]
    StatusEnvelope:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    IDStatusEnvelope:
      type: object
      required: [status, id]
      properties:
        status:
          type: string
          enum: [ok]
        id:
          type: string
    BulkUpdateEnvelope:
      type: object
      required: [status, updated]
      properties:
        status:
          type: string
          enum: [ok]
        updated:
          type: integer
          format: int64
          minimum: 0
    Folder:
      type: object
      required: [id, name, full_path, type, order_index, total, unread, starred]
      properties:
        id:
          type: string
        parent_id:
          type: string
        name:
          type: string
        full_path:
          type: string
        type:
          type: string
        system_type:
          type: string
        order_index:
          type: integer
        total:
          type: integer
          format: int64
        unread:
          type: integer
          format: int64
        starred:
          type: integer
          format: int64
    FolderListEnvelope:
      type: object
      required: [folders]
      properties:
        folders:
          type: array
          items:
            $ref: "#/components/schemas/Folder"
    FolderEnvelope:
      type: object
      required: [folder]
      properties:
        folder:
          $ref: "#/components/schemas/Folder"
    MessageSummary:
      type: object
      required: [id, subject, from_addr, from_name, received_at, size, has_attachment, read, starred]
      properties:
        id:
          type: string
        subject:
          type: string
        from_addr:
          type: string
          format: email
        from_name:
          type: string
        received_at:
          type: string
          format: date-time
        size:
          type: integer
          format: int64
        has_attachment:
          type: boolean
        read:
          type: boolean
        starred:
          type: boolean
    MessageListPageEnvelope:
      type: object
      required: [messages, limit, has_more, next_cursor]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MessageSummary"
        limit:
          type: integer
          minimum: 1
          maximum: 200
        has_more:
          type: boolean
        next_cursor:
          type: string
          description: Opaque cursor. Clients must not parse or manufacture this value.
    MessageDetail:
      allOf:
        - $ref: "#/components/schemas/MessageSummary"
        - type: object
          required: [message_id, to_addrs, cc_addrs, bcc_addrs, flags, storage_path, text_body]
          properties:
            message_id:
              type: string
            to_addrs:
              type: array
              items:
                $ref: "#/components/schemas/ComposeAddress"
            cc_addrs:
              type: array
              items:
                $ref: "#/components/schemas/ComposeAddress"
            bcc_addrs:
              type: array
              items:
                $ref: "#/components/schemas/ComposeAddress"
            flags:
              type: object
              additionalProperties: true
            storage_path:
              type: string
            text_body:
              type: string
            attachments:
              type: array
              items:
                $ref: "#/components/schemas/Attachment"
    MessageEnvelope:
      type: object
      required: [message]
      properties:
        message:
          $ref: "#/components/schemas/MessageDetail"
    DraftEnvelope:
      type: object
      required: [draft]
      properties:
        draft:
          $ref: "#/components/schemas/MessageDetail"
    SendQueued:
      type: object
      required: [id, message_id, farm]
      properties:
        id:
          type: string
        message_id:
          type: string
        farm:
          type: string
    SendQueuedEnvelope:
      type: object
      required: [message]
      properties:
        message:
          $ref: "#/components/schemas/SendQueued"
    Attachment:
      type: object
      required: [id, message_id, upload_id, storage_path, filename, size, mime_type, status, created_at]
      properties:
        id:
          type: string
        message_id:
          type: string
        upload_id:
          type: string
        storage_path:
          type: string
        filename:
          type: string
        size:
          type: integer
          format: int64
        mime_type:
          type: string
        status:
          type: string
          enum: [uploading, active, deleted]
        created_at:
          type: string
          format: date-time
    AttachmentListEnvelope:
      type: object
      required: [attachments]
      properties:
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
    AttachmentEnvelope:
      type: object
      required: [attachment]
      properties:
        attachment:
          $ref: "#/components/schemas/Attachment"
    QueueStat:
      type: object
      required: [topic, status, count]
      properties:
        topic:
          type: string
        status:
          type: string
        count:
          type: integer
          format: int64
    QueueStatsEnvelope:
      type: object
      required: [queues]
      properties:
        queues:
          type: array
          items:
            $ref: "#/components/schemas/QueueStat"
    DeliveryAttempt:
      type: object
      required: [id, message_id, rfc_message_id, farm, recipient, recipient_domain, status, error_message, attempted_at]
      properties:
        id:
          type: string
        message_id:
          type: string
        rfc_message_id:
          type: string
        farm:
          type: string
        recipient:
          type: string
          format: email
        recipient_domain:
          type: string
        status:
          type: string
        error_message:
          type: string
        attempted_at:
          type: string
          format: date-time
    DeliveryAttemptsEnvelope:
      type: object
      required: [delivery_attempts]
      properties:
        delivery_attempts:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryAttempt"
    SuppressionEntry:
      type: object
      required: [id, domain_id, email, reason, source_message_id, created_at]
      properties:
        id:
          type: string
        domain_id:
          type: string
        email:
          type: string
          format: email
        reason:
          type: string
        source_message_id:
          type: string
        created_at:
          type: string
          format: date-time
    SuppressionListEnvelope:
      type: object
      required: [suppression_list]
      properties:
        suppression_list:
          type: array
          items:
            $ref: "#/components/schemas/SuppressionEntry"
    DKIMKey:
      type: object
      required: [id, domain_id, selector, public_key_dns, status, created_at, updated_at]
      properties:
        id:
          type: string
        domain_id:
          type: string
        selector:
          type: string
        public_key_dns:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DKIMKeyListEnvelope:
      type: object
      required: [dkim_keys]
      properties:
        dkim_keys:
          type: array
          items:
            $ref: "#/components/schemas/DKIMKey"
    Domain:
      type: object
      required: [id, company_id, name, name_ace, status, quota_used, created_at]
      properties:
        id:
          type: string
        company_id:
          type: string
        name:
          type: string
        name_ace:
          type: string
        status:
          type: string
          enum: [active, suspended, disabled]
        quota_used:
          type: integer
          format: int64
          minimum: 0
