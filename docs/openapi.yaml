openapi: 3.1.0
info:
  title: gogomail Backend API
  version: 2026-05-04.backend-release
  description: Backend-only contract for the first gogomail webmail/admin release slice.
servers:
  - url: /api/v1
    description: Mail API
  - url: /admin/v1
    description: Admin API
security:
  - bearerAuth: []
paths:
  /health/live:
    get:
      summary: Process liveness probe
      security: []
      responses:
        "200":
          description: Process is alive
  /health/ready:
    get:
      summary: Service readiness probe
      security: []
      responses:
        "200":
          description: Service is ready or degraded
  /info:
    get:
      summary: Service and backend contract metadata
      responses:
        "200":
          description: Service info
  /folders:
    get:
      summary: List folders
      responses:
        "200":
          description: Folder list envelope
    post:
      summary: Create a user folder
      requestBody:
        $ref: "#/components/requestBodies/FolderCreate"
      responses:
        "201":
          description: Created folder envelope
  /folders/{id}:
    patch:
      summary: Rename a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/FolderRename"
      responses:
        "200":
          description: Folder envelope
    delete:
      summary: Delete a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Status envelope
  /messages:
    get:
      summary: List messages with opaque cursor pagination
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: folder_id
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Message list page envelope
  /messages/{id}:
    get:
      summary: Get message detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Message detail envelope
    delete:
      summary: Soft-delete a message
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Status envelope
  /messages/{id}/flags:
    patch:
      summary: Update one message flag
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageFlagUpdate"
      responses:
        "200":
          description: Status envelope
  /messages/{id}/folder:
    patch:
      summary: Move one message to a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageMove"
      responses:
        "200":
          description: Status envelope
  /messages/bulk/flags:
    patch:
      summary: Bounded bulk flag update
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageFlagUpdate"
      responses:
        "200":
          description: Bulk update count envelope
  /messages/bulk/folder:
    patch:
      summary: Bounded bulk folder move
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageMove"
      responses:
        "200":
          description: Bulk update count envelope
  /messages/bulk/delete:
    post:
      summary: Bounded bulk soft delete
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageDelete"
      responses:
        "200":
          description: Bulk update count envelope
  /messages/{id}/attachments:
    get:
      summary: List message attachments
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Attachment list envelope
  /messages/{id}/attachments/{attachment_id}/download:
    get:
      summary: Download an attachment
      parameters:
        - $ref: "#/components/parameters/PathID"
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachment bytes
  /messages/send:
    post:
      summary: Compose and queue a new/reply/forward message
      requestBody:
        $ref: "#/components/requestBodies/ComposeSend"
      responses:
        "202":
          description: Queued send result
  /drafts:
    post:
      summary: Save or update a draft
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          description: Draft envelope
  /drafts/{id}:
    patch:
      summary: Update an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          description: Draft envelope
    delete:
      summary: Delete a draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Status envelope
  /drafts/{id}/send:
    post:
      summary: Send an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "202":
          description: Queued send result
  /attachments:
    post:
      summary: Reserve attachment upload metadata
      requestBody:
        $ref: "#/components/requestBodies/AttachmentReserve"
      responses:
        "201":
          description: Attachment envelope
  /attachments/upload:
    post:
      summary: Direct multipart attachment upload
      requestBody:
        $ref: "#/components/requestBodies/AttachmentMultipartUpload"
      responses:
        "201":
          description: Attachment envelope
  /queue:
    get:
      summary: Admin queue stats
      responses:
        "200":
          description: Queue stats envelope
  /delivery-attempts:
    get:
      summary: Admin delivery attempt list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Delivery attempts envelope
  /suppression-list:
    get:
      summary: Admin suppression list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Suppression list envelope
  /suppression-list/{id}:
    delete:
      summary: Admin remove suppression entry
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Status envelope
  /dkim-keys:
    get:
      summary: Admin DKIM key list
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: domain_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: DKIM key list envelope
    post:
      summary: Admin create DKIM key
      requestBody:
        $ref: "#/components/requestBodies/DKIMKeyCreate"
      responses:
        "201":
          description: DKIM key id envelope
  /dkim-keys/{id}:
    delete:
      summary: Admin deactivate DKIM key
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Status envelope
  /outbox/{id}/retry:
    post:
      summary: Admin retry one outbox event
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Status envelope
  /domains:
    get:
      summary: Admin domain list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Domain list envelope
    post:
      summary: Admin create domain
      requestBody:
        $ref: "#/components/requestBodies/DomainCreate"
      responses:
        "201":
          description: Domain envelope
  /domains/{id}:
    get:
      summary: Admin domain detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Domain envelope
  /domains/{id}/status:
    patch:
      summary: Admin update domain status
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/StatusUpdate"
      responses:
        "200":
          description: Status envelope
  /domains/{id}/quota:
    patch:
      summary: Admin update domain quota
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/QuotaUpdate"
      responses:
        "200":
          description: Status envelope
  /users:
    get:
      summary: Admin user list
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: domain_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: User list envelope
    post:
      summary: Admin create user
      requestBody:
        $ref: "#/components/requestBodies/UserCreate"
      responses:
        "201":
          description: User envelope
  /users/{id}:
    get:
      summary: Admin user detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: User envelope
  /users/{id}/status:
    patch:
      summary: Admin update user status
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/StatusUpdate"
      responses:
        "200":
          description: Status envelope
  /users/{id}/quota:
    patch:
      summary: Admin update user quota
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/QuotaUpdate"
      responses:
        "200":
          description: Status envelope
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
  parameters:
    PathID:
      name: id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  requestBodies:
    FolderCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderCreateRequest"
    FolderRename:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderRenameRequest"
    MessageFlagUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageFlagUpdateRequest"
    MessageMove:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageMoveRequest"
    BulkMessageFlagUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkMessageFlagUpdateRequest"
    BulkMessageMove:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkMessageMoveRequest"
    BulkMessageDelete:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkMessageDeleteRequest"
    ComposeSend:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComposeRequest"
    DraftSave:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComposeRequest"
    AttachmentReserve:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AttachmentReserveRequest"
    AttachmentMultipartUpload:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "#/components/schemas/AttachmentMultipartUploadRequest"
    DomainCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DomainCreateRequest"
    UserCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserCreateRequest"
    StatusUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StatusUpdateRequest"
    QuotaUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/QuotaUpdateRequest"
    DKIMKeyCreate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DKIMKeyCreateRequest"
  schemas:
    FolderCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    FolderRenameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    MessageFlagUpdateRequest:
      type: object
      required: [flag, value]
      properties:
        flag:
          type: string
          enum: [read, starred, answered, forwarded]
        value:
          type: boolean
    MessageMoveRequest:
      type: object
      required: [folder_id]
      properties:
        folder_id:
          type: string
    BulkMessageFlagUpdateRequest:
      type: object
      required: [message_ids, flag, value]
      properties:
        message_ids:
          type: array
          maxItems: 500
          items:
            type: string
        flag:
          type: string
          enum: [read, starred, answered, forwarded]
        value:
          type: boolean
    BulkMessageMoveRequest:
      type: object
      required: [message_ids, folder_id]
      properties:
        message_ids:
          type: array
          maxItems: 500
          items:
            type: string
        folder_id:
          type: string
    BulkMessageDeleteRequest:
      type: object
      required: [message_ids]
      properties:
        message_ids:
          type: array
          maxItems: 500
          items:
            type: string
    ComposeAddress:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
    ComposeRequest:
      type: object
      required: [intent, subject, text_body]
      properties:
        user_id:
          type: string
          description: Development fallback when bearer auth is disabled.
        draft_id:
          type: string
        intent:
          type: string
          enum: [new, reply, forward]
        source_message_id:
          type: string
        from:
          type: string
          format: email
        to:
          type: array
          items:
            $ref: "#/components/schemas/ComposeAddress"
        cc:
          type: array
          items:
            $ref: "#/components/schemas/ComposeAddress"
        bcc:
          type: array
          items:
            $ref: "#/components/schemas/ComposeAddress"
        subject:
          type: string
        text_body:
          type: string
        attachment_ids:
          type: array
          items:
            type: string
        transactional:
          type: boolean
        scheduled_at:
          type: string
          format: date-time
    AttachmentReserveRequest:
      type: object
      required: [filename, size, mime_type]
      properties:
        draft_id:
          type: string
        filename:
          type: string
        size:
          type: integer
          format: int64
          minimum: 0
        mime_type:
          type: string
        storage_path:
          type: string
    AttachmentMultipartUploadRequest:
      type: object
      required: [file]
      properties:
        draft_id:
          type: string
        file:
          type: string
          format: binary
    DomainCreateRequest:
      type: object
      required: [company_id, name]
      properties:
        company_id:
          type: string
        name:
          type: string
        name_ace:
          type: string
        quota_limit:
          type: integer
          format: int64
          minimum: 0
    UserCreateRequest:
      type: object
      required: [domain_id, username, display_name, address]
      properties:
        domain_id:
          type: string
        username:
          type: string
        display_name:
          type: string
        address:
          type: string
          format: email
        quota_limit:
          type: integer
          format: int64
          minimum: 0
    StatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, suspended, disabled]
    QuotaUpdateRequest:
      type: object
      required: [quota_limit]
      properties:
        quota_limit:
          type: integer
          format: int64
          minimum: 0
    DKIMKeyCreateRequest:
      type: object
      required: [domain_id, selector, private_key_pem]
      properties:
        domain_id:
          type: string
        selector:
          type: string
        private_key_pem:
          type: string
        active:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, status, status_text]
          properties:
            code:
              type: string
            message:
              type: string
            status:
              type: integer
            status_text:
              type: string
        error_message:
          type: string
