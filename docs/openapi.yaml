components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer authentication headers are size-bounded before JWT parsing.
    apiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: GoGoMail API key
      description: "Use Authorization: Bearer gm_... for trusted server-to-server external integrations. API-key mailbox calls should identify the target mailbox with user_email or X-Gogomail-User-Email. user_id and X-Gogomail-User-ID remain supported for systems that already store GoGoMail IDs. Calls are recorded by API metering."
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: Admin token headers are size-bounded before token comparison.
  responses:
    Health:
      description: Process is alive
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthResponse"
    Readiness:
      description: Service is ready or degraded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReadinessResponse"
    Info:
      description: Service and backend contract metadata
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InfoResponse"
    Status:
      description: Stable status envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StatusEnvelope"
    IDStatus:
      description: Stable status envelope with affected resource id
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/IDStatusEnvelope"
    BulkUpdate:
      description: Bulk update count envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkUpdateEnvelope"
    WebmailCapabilities:
      description: Webmail frontend capability envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WebmailCapabilitiesEnvelope"
    AdminConsoleCapabilities:
      description: Admin console capability envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AdminConsoleCapabilitiesEnvelope"
    FolderList:
      description: Folder list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderListEnvelope"
    Folder:
