      properties:
        draft_id:
          type: string
        file:
          type: string
          format: binary
    DomainCreateRequest:
      type: object
      required: [company_id, name]
      properties:
        company_id:
          type: string
        name:
          type: string
        name_ace:
          type: string
        quota_limit:
          type: integer
          format: int64
          minimum: 0
    UserCreateRequest:
      type: object
      required: [domain_id, username, display_name, address]
      properties:
        domain_id:
          type: string
        username:
          type: string
        display_name:
          type: string
        address:
          type: string
          format: email
        quota_limit:
          type: integer
          format: int64
          minimum: 0
    StatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, suspended, disabled]
    QuotaUpdateRequest:
      type: object
      required: [quota_limit]
      properties:
        quota_limit:
          type: integer
          format: int64
          minimum: 0
    DomainPolicyUpdateRequest:
      type: object
      required: [inbound_mode, outbound_mode]
      properties:
        inbound_mode:
          type: string
          enum: [inherit, monitor, enforce]
        outbound_mode:
          type: string
          enum: [inherit, monitor, enforce]
        max_recipients_per_message:
          type: integer
          minimum: 0
        max_message_bytes:
          type: integer
          format: int64
          minimum: 0
    DKIMKeyCreateRequest:
      type: object
      required: [domain_id, selector, private_key_pem]
      properties:
        domain_id:
          type: string
        selector:
          type: string
        private_key_pem:
          type: string
        active:
          type: boolean
    TrustedRelayCreateRequest:
      type: object
      required: [cidr]
      properties:
        cidr:
          type: string
          description: IPv4/IPv6 address or CIDR prefix. Plain IPs are canonicalized to /32 or /128.
        description:
          type: string
          maxLength: 512
    DeliveryRouteCreateRequest:
      type: object
      required: [domain_pattern, hosts]
      properties:
        domain_pattern:
          type: string
          description: Exact domain, wildcard suffix such as *.example.net, or * default route.
        farm:
          type: string
        hosts:
          type: array
          minItems: 1
          items:
            type: string
          description: Gateway or smart-host DNS names/IP literals without ports.
        port:
          type: integer
          minimum: 1
          maximum: 65535
          default: 25
        tls_mode:
          type: string
          enum: [opportunistic, require, disable]
          default: opportunistic
        implicit_tls:
          type: boolean
          default: false
        smtp_hello:
          type: string
        pool_name:
          type: string
        auth_identity:
          type: string
        auth_username:
          type: string
        auth_password:
          type: string
          writeOnly: true
        description:
          type: string
          maxLength: 512
    DeliveryRouteStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, disabled]
    BackpressureUpdateRequest:
      type: object
      required: [level]
      properties:
        level:
          type: string
          enum: [normal, warning, danger, critical]
        reason:
          type: string
          maxLength: 512
        until:
          type: string
          format: date-time
    ErrorEnvelope:
      type: object
      required: [error, error_message]
      properties:
        error:
          type: object
          required: [code, message, status, status_text]
          properties:
            code:
              type: string
            message:
              type: string
            status:
              type: integer
            status_text:
              type: string
        error_message:
          type: string
