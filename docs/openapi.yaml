  parameters:
    PathID:
      name: id
      in: path
      required: true
      schema:
        type: string
        maxLength: 1024
    AttachmentID:
      name: attachment_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 200
    DigestID:
      name: digest_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 1024
    SignatureID:
      name: signature_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 1024
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    UserIDFallback:
      name: user_id
      in: query
      required: false
      description: Development fallback required only when JWT auth is disabled. For API-key external integrations, prefer user_email because external systems usually know email addresses before GoGoMail internal user IDs.
      schema:
        type: string
        maxLength: 200
    UserEmailFallback:
      name: user_email
      in: query
      required: false
      description: Recommended target mailbox identifier for trusted server-to-server API-key integrations. Use an email address such as user@example.com. If user_email and user_id are both supplied, they must resolve to the same GoGoMail user.
      schema:
        type: string
        format: email
        maxLength: 320
    ExternalIntegrationUserIDHeader:
      name: X-Gogomail-User-ID
      in: header
      required: false
      description: Internal GoGoMail user ID target for trusted server-to-server API-key integrations. Prefer X-Gogomail-User-Email unless the external system already stores GoGoMail user IDs.
      schema:
        type: string
        maxLength: 200
    ExternalIntegrationUserEmailHeader:
      name: X-Gogomail-User-Email
      in: header
      required: false
      description: Recommended target mailbox user for trusted server-to-server API-key integrations. If this header is supplied with user_id or X-Gogomail-User-ID, all identifiers must resolve to the same user.
      schema:
        type: string
        format: email
        maxLength: 320
