openapi: 3.1.0
info:
  title: gogomail Backend API
  version: 2026-05-04.backend-release
  description: Backend-only contract for the first gogomail webmail/admin release slice.
servers:
  - url: /api/v1
    description: Mail API
  - url: /admin/v1
    description: Admin API
security:
  - bearerAuth: []
paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Process liveness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Health"
  /health/ready:
    get:
      operationId: getHealthReady
      summary: Service readiness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Readiness"
  /info:
    get:
      operationId: getServiceInfo
      summary: Service and backend contract metadata
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Info"
  /folders:
    get:
      operationId: listFolders
      summary: List folders
      responses:
        "200":
          $ref: "#/components/responses/FolderList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createFolder
      summary: Create a user folder
      requestBody:
        $ref: "#/components/requestBodies/FolderCreate"
      responses:
        "201":
          $ref: "#/components/responses/Folder"
        default:
          $ref: "#/components/responses/Error"
  /folders/{id}:
    patch:
      operationId: renameFolder
      summary: Rename a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/FolderRename"
      responses:
        "200":
          $ref: "#/components/responses/Folder"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteFolder
      summary: Delete a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages:
    get:
      operationId: listMessages
      summary: List messages with opaque cursor pagination
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: folder_id
          in: query
          schema:
            type: string
            maxLength: 200
        - name: cursor
          in: query
          schema:
            type: string
            maxLength: 1024
      responses:
        "200":
          $ref: "#/components/responses/MessageListPage"
        default:
          $ref: "#/components/responses/Error"
  /search:
    get:
      operationId: searchMessages
      summary: Search messages using the current backend search implementation
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: q
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: folder_id
          in: query
          schema:
            type: string
            maxLength: 200
        - name: from
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: subject
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: has_attachment
          in: query
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            maxLength: 32
            enum: [date, relevance]
            default: date
        - name: include_rank
          in: query
          schema:
            type: boolean
            default: false
        - name: include_highlights
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          $ref: "#/components/responses/MessageList"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}:
    get:
      operationId: getMessage
      summary: Get message detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteMessage
      summary: Soft-delete a message
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/delivery-status:
    get:
      operationId: getMessageDeliveryStatus
      summary: Get user-scoped delivery and bounce status for a sent message
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/MessageDeliveryStatus"
        default:
          $ref: "#/components/responses/Error"
  /threads:
    get:
      operationId: listThreads
      summary: List message threads for the current mailbox
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/ThreadList"
        default:
          $ref: "#/components/responses/Error"
  /threads/{id}/messages:
    get:
      operationId: listThreadMessages
      summary: List messages inside a thread in chronological order
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/MessageList"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/flags:
    patch:
      operationId: updateMessageFlags
      summary: Update one message flag
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageFlagUpdate"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/folder:
    patch:
      operationId: moveMessage
      summary: Move one message to a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageMove"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages/bulk/flags:
    patch:
      operationId: bulkUpdateMessageFlags
      summary: Bounded bulk flag update
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageFlagUpdate"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
        default:
          $ref: "#/components/responses/Error"
  /messages/bulk/folder:
    patch:
      operationId: bulkMoveMessages
      summary: Bounded bulk folder move
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageMove"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
        default:
          $ref: "#/components/responses/Error"
  /messages/bulk/delete:
    post:
      operationId: bulkDeleteMessages
      summary: Bounded bulk soft delete
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageDelete"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/attachments:
    get:
      operationId: listMessageAttachments
      summary: List message attachments
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/AttachmentList"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/attachments/{attachment_id}/download:
    get:
      operationId: downloadMessageAttachment
      summary: Download an attachment
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/AttachmentID"
      responses:
        "200":
          description: Attachment bytes
          headers:
            Content-Disposition:
              description: Attachment disposition with safe filename fallback and UTF-8 filename* when available.
              schema:
                type: string
            Cache-Control:
              description: Private attachment downloads are not cacheable by shared clients.
              schema:
                type: string
                enum: [no-store]
            X-Content-Type-Options:
              description: Prevent browser MIME sniffing for attachment bytes.
              schema:
                type: string
                enum: [nosniff]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/Error"
  /messages/send:
    post:
      operationId: sendMessage
      summary: Compose and queue a new/reply/forward message
      requestBody:
        $ref: "#/components/requestBodies/ComposeSend"
      responses:
        "202":
          $ref: "#/components/responses/SendQueued"
        default:
          $ref: "#/components/responses/Error"
  /drafts:
    post:
      operationId: saveDraft
      summary: Save or update a draft
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          $ref: "#/components/responses/Draft"
        default:
          $ref: "#/components/responses/Error"
  /drafts/search:
    get:
      operationId: searchDrafts
      summary: Search active drafts using the compose-focused draft store
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: q
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: from
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: subject
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: has_attachment
          in: query
          schema:
            type: boolean
      responses:
        "200":
          $ref: "#/components/responses/DraftList"
        default:
          $ref: "#/components/responses/Error"
  /drafts/{id}:
    patch:
      operationId: updateDraft
      summary: Update an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          $ref: "#/components/responses/Draft"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteDraft
      summary: Delete a draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /drafts/{id}/send:
    post:
      operationId: sendDraft
      summary: Send an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "202":
          $ref: "#/components/responses/SendQueued"
        default:
          $ref: "#/components/responses/Error"
  /attachments:
    post:
      operationId: reserveAttachment
      summary: Reserve attachment upload metadata
      requestBody:
        $ref: "#/components/requestBodies/AttachmentReserve"
      responses:
        "201":
          $ref: "#/components/responses/Attachment"
        "413":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /attachments/upload:
    post:
      operationId: uploadAttachment
      summary: Direct multipart attachment upload
      requestBody:
        $ref: "#/components/requestBodies/AttachmentMultipartUpload"
      responses:
        "201":
          $ref: "#/components/responses/Attachment"
        "413":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /attachments/upload-sessions:
    post:
      operationId: createAttachmentUploadSession
      summary: Create a resumable attachment upload session
      requestBody:
        $ref: "#/components/requestBodies/AttachmentUploadSessionCreate"
      responses:
        "201":
          $ref: "#/components/responses/AttachmentUploadSession"
        "413":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /attachments/capabilities:
    get:
      operationId: getAttachmentUploadCapabilities
      summary: Get attachment upload limits and supported modes
      responses:
        "200":
          $ref: "#/components/responses/AttachmentUploadCapabilities"
        default:
          $ref: "#/components/responses/Error"
  /attachments/{id}:
    delete:
      operationId: cancelAttachmentUpload
      summary: Cancel a pending attachment upload and release reserved quota
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Attachment"
        default:
          $ref: "#/components/responses/Error"
  /attachments/upload-sessions/{id}:
    get:
      operationId: getAttachmentUploadSession
      summary: Get a resumable attachment upload session
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/AttachmentUploadSession"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: cancelAttachmentUploadSession
      summary: Cancel a pending resumable attachment upload session
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/AttachmentUploadSession"
        default:
          $ref: "#/components/responses/Error"
  /attachments/upload-sessions/{id}/body:
    put:
      operationId: storeAttachmentUploadSessionBody
      summary: Store a complete resumable attachment upload session body
      parameters:
        - $ref: "#/components/parameters/PathID"
        - name: X-Content-SHA256
          in: header
          required: false
          schema:
            type: string
            pattern: "^[0-9a-f]{64}$"
          description: Optional lowercase SHA-256 hex digest the stored body must match.
      requestBody:
        $ref: "#/components/requestBodies/AttachmentUploadSessionBody"
      responses:
        "200":
          $ref: "#/components/responses/AttachmentUploadSession"
        "413":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /attachments/upload-sessions/{id}/finalize:
    post:
      operationId: finalizeAttachmentUploadSession
      summary: Finalize a stored attachment upload session body
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "201":
          $ref: "#/components/responses/Attachment"
        default:
          $ref: "#/components/responses/Error"
  /push-devices:
    get:
      operationId: listPushDevices
      summary: List user push notification devices
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/PushDeviceList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: upsertPushDevice
      summary: Register or refresh a user push notification device
      requestBody:
        $ref: "#/components/requestBodies/PushDeviceUpsert"
      responses:
        "201":
          $ref: "#/components/responses/PushDevice"
        default:
          $ref: "#/components/responses/Error"
  /push-devices/{id}:
    delete:
      operationId: deletePushDevice
      summary: Delete a user push notification device
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /queue:
    get:
      operationId: getAdminQueueStats
      summary: Admin queue stats
      responses:
        "200":
          $ref: "#/components/responses/QueueStats"
        default:
          $ref: "#/components/responses/Error"
  /imap/mailboxes/{id}/uid-backfill:
    post:
      operationId: backfillAdminIMAPMailboxUIDs
      summary: Admin assign missing IMAP mailbox UIDs in a bounded batch
      parameters:
        - $ref: "#/components/parameters/PathID"
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            maxLength: 1024
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/IMAPUIDBackfill"
        default:
          $ref: "#/components/responses/Error"
  /outbox-events:
    get:
      operationId: listAdminOutboxEvents
      summary: Admin outbox event list without payload bodies
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: topic
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: partition_key
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: status
          in: query
          schema:
            type: string
            maxLength: 1024
            enum: [pending, processing, done, failed]
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 lower bound for outbox event creation timestamps.
      responses:
        "200":
          $ref: "#/components/responses/OutboxEventList"
        default:
          $ref: "#/components/responses/Error"
  /outbox-events/{id}:
    get:
      operationId: getAdminOutboxEvent
      summary: Admin outbox event metadata detail without payload body
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/OutboxEvent"
        default:
          $ref: "#/components/responses/Error"
  /audit-logs:
    get:
      operationId: listAdminAuditLogs
      summary: Admin audit log list for operational forensics
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: category
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: action
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: result
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: target_type
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: company_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: domain_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: user_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 lower bound for audit log creation timestamps.
      responses:
        "200":
          $ref: "#/components/responses/AuditLogList"
        default:
          $ref: "#/components/responses/Error"
  /audit-logs/integrity:
    get:
      operationId: checkAdminAuditLogIntegrity
      summary: Check recent audit log hash-chain integrity
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 lower bound for audit log creation timestamps.
      responses:
        "200":
          $ref: "#/components/responses/AuditLogIntegrity"
        default:
          $ref: "#/components/responses/Error"
  /audit-logs/{id}:
    get:
      operationId: getAdminAuditLog
      summary: Admin audit log detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/AuditLog"
        default:
          $ref: "#/components/responses/Error"
  /backpressure:
    get:
      operationId: getAdminBackpressure
      summary: Admin inspect SMTP backpressure state
      responses:
        "200":
          $ref: "#/components/responses/Backpressure"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateAdminBackpressure
      summary: Admin update SMTP backpressure state
      requestBody:
        $ref: "#/components/requestBodies/BackpressureUpdate"
      responses:
        "200":
          $ref: "#/components/responses/Backpressure"
        default:
          $ref: "#/components/responses/Error"
  /quota-usage:
    get:
      operationId: listAdminQuotaUsage
      summary: Admin domain and user quota usage pressure list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/QuotaUsageList"
        default:
          $ref: "#/components/responses/Error"
  /attachment-cleanup/candidates:
    post:
      operationId: listAdminAttachmentCleanupCandidates
      summary: Preview stale attachment upload cleanup candidates
      requestBody:
        $ref: "#/components/requestBodies/AttachmentCleanupRun"
      responses:
        "200":
          $ref: "#/components/responses/AttachmentCleanupCandidates"
        default:
          $ref: "#/components/responses/Error"
  /attachment-cleanup/runs:
    post:
      operationId: runAdminAttachmentCleanup
      summary: Run stale attachment upload cleanup once
      requestBody:
        $ref: "#/components/requestBodies/AttachmentCleanupRun"
      responses:
        "200":
          $ref: "#/components/responses/AttachmentCleanupRun"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/daily:
    get:
      operationId: listAdminAPIUsageDaily
      summary: Admin daily API usage aggregates
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageDailyList"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/monthly:
    get:
      operationId: listAdminAPIUsageMonthly
      summary: Admin monthly API usage aggregates
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/APIUsageMonthlyList"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/ledger:
    get:
      operationId: listAdminAPIUsageLedger
      summary: Admin immutable API usage ledger events
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: tenant_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: principal_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 event timestamp lower bound.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive RFC3339 event timestamp upper bound.
      responses:
        "200":
          $ref: "#/components/responses/APIUsageLedgerList"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/ledger/export:
    get:
      operationId: exportAdminAPIUsageLedger
      summary: Export immutable API usage ledger events as NDJSON
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: tenant_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: principal_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 event timestamp lower bound.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive RFC3339 event timestamp upper bound.
      responses:
        "200":
          $ref: "#/components/responses/APIUsageLedgerExport"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/ledger/stats:
    get:
      operationId: getAdminAPIUsageLedgerStats
      summary: Admin immutable API usage ledger export statistics
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: principal_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 event timestamp lower bound.
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Exclusive RFC3339 event timestamp upper bound.
      responses:
        "200":
          $ref: "#/components/responses/APIUsageLedgerStats"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/ledger/retention-readiness:
    get:
      operationId: getAdminAPIUsageLedgerRetentionReadiness
      summary: Check whether immutable API usage ledger rows are ready for retention handling
      parameters:
        - name: cutoff
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Exclusive RFC3339 event timestamp upper bound for retention candidates; future cutoffs are rejected.
        - name: tenant_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: principal_id
          in: query
          schema:
            type: string
            maxLength: 1024
      responses:
        "200":
          $ref: "#/components/responses/APIUsageLedgerRetentionReadiness"
        default:
          $ref: "#/components/responses/Error"
  /api-usage/ledger/retention-runs:
    get:
      operationId: listAdminAPIUsageLedgerRetentionRuns
      summary: List immutable API usage ledger retention run audit records
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: tenant_id
          in: query
          schema:
            type: string
            maxLength: 1024
        - name: principal_id
          in: query
          schema:
            type: string
            maxLength: 1024
