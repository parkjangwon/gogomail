openapi: 3.1.0
info:
  title: gogomail Backend API
  version: 2026-05-04.backend-release
  description: Backend-only contract for the first gogomail webmail/admin release slice.
servers:
  - url: /api/v1
    description: Mail API
  - url: /admin/v1
    description: Admin API
security:
  - bearerAuth: []
paths:
  /health/live:
    get:
      operationId: getHealthLive
      summary: Process liveness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Health"
  /health/ready:
    get:
      operationId: getHealthReady
      summary: Service readiness probe
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Readiness"
  /info:
    get:
      operationId: getServiceInfo
      summary: Service and backend contract metadata
      security: []
      responses:
        "200":
          $ref: "#/components/responses/Info"
  /folders:
    get:
      operationId: listFolders
      summary: List folders
      responses:
        "200":
          $ref: "#/components/responses/FolderList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createFolder
      summary: Create a user folder
      requestBody:
        $ref: "#/components/requestBodies/FolderCreate"
      responses:
        "201":
          $ref: "#/components/responses/Folder"
        default:
          $ref: "#/components/responses/Error"
  /folders/{id}:
    patch:
      operationId: renameFolder
      summary: Rename a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/FolderRename"
      responses:
        "200":
          $ref: "#/components/responses/Folder"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteFolder
      summary: Delete a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages:
    get:
      operationId: listMessages
      summary: List messages with opaque cursor pagination
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: folder_id
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/MessageListPage"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}:
    get:
      operationId: getMessage
      summary: Get message detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Message"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteMessage
      summary: Soft-delete a message
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/delivery-status:
    get:
      operationId: getMessageDeliveryStatus
      summary: Get user-scoped delivery and bounce status for a sent message
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/MessageDeliveryStatus"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/flags:
    patch:
      operationId: updateMessageFlags
      summary: Update one message flag
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageFlagUpdate"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/folder:
    patch:
      operationId: moveMessage
      summary: Move one message to a folder
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/MessageMove"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /messages/bulk/flags:
    patch:
      operationId: bulkUpdateMessageFlags
      summary: Bounded bulk flag update
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageFlagUpdate"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
        default:
          $ref: "#/components/responses/Error"
  /messages/bulk/folder:
    patch:
      operationId: bulkMoveMessages
      summary: Bounded bulk folder move
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageMove"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
        default:
          $ref: "#/components/responses/Error"
  /messages/bulk/delete:
    post:
      operationId: bulkDeleteMessages
      summary: Bounded bulk soft delete
      requestBody:
        $ref: "#/components/requestBodies/BulkMessageDelete"
      responses:
        "200":
          $ref: "#/components/responses/BulkUpdate"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/attachments:
    get:
      operationId: listMessageAttachments
      summary: List message attachments
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/AttachmentList"
        default:
          $ref: "#/components/responses/Error"
  /messages/{id}/attachments/{attachment_id}/download:
    get:
      operationId: downloadMessageAttachment
      summary: Download an attachment
      parameters:
        - $ref: "#/components/parameters/PathID"
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachment bytes
        default:
          $ref: "#/components/responses/Error"
  /messages/send:
    post:
      operationId: sendMessage
      summary: Compose and queue a new/reply/forward message
      requestBody:
        $ref: "#/components/requestBodies/ComposeSend"
      responses:
        "202":
          $ref: "#/components/responses/SendQueued"
        default:
          $ref: "#/components/responses/Error"
  /drafts:
    post:
      operationId: saveDraft
      summary: Save or update a draft
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          $ref: "#/components/responses/Draft"
        default:
          $ref: "#/components/responses/Error"
  /drafts/{id}:
    patch:
      operationId: updateDraft
      summary: Update an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/DraftSave"
      responses:
        "200":
          $ref: "#/components/responses/Draft"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteDraft
      summary: Delete a draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Status"
        default:
          $ref: "#/components/responses/Error"
  /drafts/{id}/send:
    post:
      operationId: sendDraft
      summary: Send an existing draft
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "202":
          $ref: "#/components/responses/SendQueued"
        default:
          $ref: "#/components/responses/Error"
  /attachments:
    post:
      operationId: reserveAttachment
      summary: Reserve attachment upload metadata
      requestBody:
        $ref: "#/components/requestBodies/AttachmentReserve"
      responses:
        "201":
          $ref: "#/components/responses/Attachment"
        default:
          $ref: "#/components/responses/Error"
  /attachments/upload:
    post:
      operationId: uploadAttachment
      summary: Direct multipart attachment upload
      requestBody:
        $ref: "#/components/requestBodies/AttachmentMultipartUpload"
      responses:
        "201":
          $ref: "#/components/responses/Attachment"
        default:
          $ref: "#/components/responses/Error"
  /queue:
    get:
      operationId: getAdminQueueStats
      summary: Admin queue stats
      responses:
        "200":
          $ref: "#/components/responses/QueueStats"
        default:
          $ref: "#/components/responses/Error"
  /backpressure:
    get:
      operationId: getAdminBackpressure
      summary: Admin inspect SMTP backpressure state
      responses:
        "200":
          $ref: "#/components/responses/Backpressure"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateAdminBackpressure
      summary: Admin update SMTP backpressure state
      requestBody:
        $ref: "#/components/requestBodies/BackpressureUpdate"
      responses:
        "200":
          $ref: "#/components/responses/Backpressure"
        default:
          $ref: "#/components/responses/Error"
  /quota-usage:
    get:
      operationId: listAdminQuotaUsage
      summary: Admin domain and user quota usage pressure list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/QuotaUsageList"
        default:
          $ref: "#/components/responses/Error"
  /delivery-attempts:
    get:
      operationId: listAdminDeliveryAttempts
      summary: Admin delivery attempt list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DeliveryAttempts"
        default:
          $ref: "#/components/responses/Error"
  /suppression-list:
    get:
      operationId: listAdminSuppressionEntries
      summary: Admin suppression list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/SuppressionList"
        default:
          $ref: "#/components/responses/Error"
  /suppression-list/{id}:
    delete:
      operationId: deleteAdminSuppressionEntry
      summary: Admin remove suppression entry
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /trusted-relays:
    get:
      operationId: listAdminTrustedRelays
      summary: Admin trusted relay CIDR list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/TrustedRelayList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAdminTrustedRelay
      summary: Admin add trusted relay CIDR
      requestBody:
        $ref: "#/components/requestBodies/TrustedRelayCreate"
      responses:
        "201":
          $ref: "#/components/responses/TrustedRelay"
        default:
          $ref: "#/components/responses/Error"
  /trusted-relays/{id}:
    delete:
      operationId: deleteAdminTrustedRelay
      summary: Admin remove trusted relay CIDR
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /delivery-routes:
    get:
      operationId: listAdminDeliveryRoutes
      summary: Admin delivery gateway and smart-host route list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DeliveryRouteList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAdminDeliveryRoute
      summary: Admin create delivery gateway or smart-host route
      requestBody:
        $ref: "#/components/requestBodies/DeliveryRouteCreate"
      responses:
        "201":
          $ref: "#/components/responses/DeliveryRoute"
        default:
          $ref: "#/components/responses/Error"
  /delivery-routes/resolve:
    get:
      operationId: resolveAdminDeliveryRoute
      summary: Admin resolve the active delivery route for a recipient domain
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/DeliveryRouteResolution"
        default:
          $ref: "#/components/responses/Error"
  /delivery-routes/{id}/status:
    patch:
      operationId: updateAdminDeliveryRouteStatus
      summary: Admin enable or disable a delivery route
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/DeliveryRouteStatusUpdate"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /delivery-routes/{id}:
    delete:
      operationId: deleteAdminDeliveryRoute
      summary: Admin remove delivery route
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /delivery-routes/counters:
    get:
      operationId: getAdminDeliveryRouteCounters
      summary: Admin delivery route runtime counters
      responses:
        "200":
          description: Per-farm delivery counters since process start
          content:
            application/json:
              schema:
                type: object
                required: [route_counters]
                properties:
                  route_counters:
                    type: array
                    items:
                      type: object
                      required: [pool, delivered, failed, retried, exhausted, since]
                      properties:
                        pool:
                          type: string
                        delivered:
                          type: integer
                        failed:
                          type: integer
                        retried:
                          type: integer
                        exhausted:
                          type: integer
                        since:
                          type: string
                          format: date-time
        default:
          $ref: "#/components/responses/Error"
  /dkim-keys:
    get:
      operationId: listAdminDkimKeys
      summary: Admin DKIM key list
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: domain_id
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/DKIMKeyList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAdminDkimKey
      summary: Admin create DKIM key
      requestBody:
        $ref: "#/components/requestBodies/DKIMKeyCreate"
      responses:
        "201":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /dkim-keys/{id}:
    delete:
      operationId: deleteAdminDkimKey
      summary: Admin deactivate DKIM key
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /dkim-keys/{id}/verify-dns:
    post:
      operationId: verifyAdminDkimKeyDns
      summary: Admin verify DKIM key DNS record
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: DKIM key DNS verification result
          content:
            application/json:
              schema:
                type: object
                required: [dkim_verification]
                properties:
                  dkim_verification:
                    type: object
                    required: [key_id, domain_id, selector, check]
                    properties:
                      key_id:
                        type: string
                      domain_id:
                        type: string
                      selector:
                        type: string
                      check:
                        type: object
                      verified_at:
                        type: string
                        format: date-time
        default:
          $ref: "#/components/responses/Error"
  /outbox/{id}/retry:
    post:
      operationId: retryAdminOutboxEvent
      summary: Admin retry one outbox event
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /domains:
    get:
      operationId: listAdminDomains
      summary: Admin domain list
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DomainList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAdminDomain
      summary: Admin create domain
      requestBody:
        $ref: "#/components/requestBodies/DomainCreate"
      responses:
        "201":
          $ref: "#/components/responses/Domain"
        default:
          $ref: "#/components/responses/Error"
  /domains/{id}:
    get:
      operationId: getAdminDomain
      summary: Admin domain detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/Domain"
        default:
          $ref: "#/components/responses/Error"
  /domains/{id}/dns-check:
    get:
      operationId: checkAdminDomainDns
      summary: Admin verify domain DNS records
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/DomainDNSCheck"
        default:
          $ref: "#/components/responses/Error"
  /domains/{id}/dns-checks:
    get:
      operationId: listAdminDomainDnsChecks
      summary: Admin list persisted domain DNS verification history
      parameters:
        - $ref: "#/components/parameters/PathID"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          $ref: "#/components/responses/DomainDNSCheckHistory"
        default:
          $ref: "#/components/responses/Error"
  /domains/{id}/status:
    patch:
      operationId: updateAdminDomainStatus
      summary: Admin update domain status
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/StatusUpdate"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /domains/{id}/quota:
    patch:
      operationId: updateAdminDomainQuota
      summary: Admin update domain quota
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/QuotaUpdate"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /domains/{id}/policy:
    patch:
      operationId: updateAdminDomainPolicy
      summary: Admin update domain operational policy model
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/DomainPolicyUpdate"
      responses:
        "200":
          $ref: "#/components/responses/DomainPolicy"
        default:
          $ref: "#/components/responses/Error"
  /users:
    get:
      operationId: listAdminUsers
      summary: Admin user list
      parameters:
        - $ref: "#/components/parameters/Limit"
        - name: domain_id
          in: query
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/UserList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAdminUser
      summary: Admin create user
      requestBody:
        $ref: "#/components/requestBodies/UserCreate"
      responses:
        "201":
          $ref: "#/components/responses/User"
        default:
          $ref: "#/components/responses/Error"
  /users/{id}:
    get:
      operationId: getAdminUser
      summary: Admin user detail
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          $ref: "#/components/responses/User"
        default:
          $ref: "#/components/responses/Error"
  /users/{id}/status:
    patch:
      operationId: updateAdminUserStatus
      summary: Admin update user status
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/StatusUpdate"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
  /users/{id}/quota:
    patch:
      operationId: updateAdminUserQuota
      summary: Admin update user quota
      parameters:
        - $ref: "#/components/parameters/PathID"
      requestBody:
        $ref: "#/components/requestBodies/QuotaUpdate"
      responses:
        "200":
          $ref: "#/components/responses/IDStatus"
        default:
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
  responses:
    Health:
      description: Process is alive
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthResponse"
    Readiness:
      description: Service is ready or degraded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ReadinessResponse"
    Info:
      description: Service and backend contract metadata
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InfoResponse"
    Status:
      description: Stable status envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StatusEnvelope"
    IDStatus:
      description: Stable status envelope with affected resource id
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/IDStatusEnvelope"
    BulkUpdate:
      description: Bulk update count envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BulkUpdateEnvelope"
    FolderList:
      description: Folder list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderListEnvelope"
    Folder:
      description: Folder resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FolderEnvelope"
    MessageListPage:
      description: Message list page envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageListPageEnvelope"
    Message:
      description: Message detail envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageEnvelope"
    MessageDeliveryStatus:
      description: User-scoped delivery status envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageDeliveryStatusEnvelope"
    Draft:
      description: Draft resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DraftEnvelope"
    SendQueued:
      description: Queued send result envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SendQueuedEnvelope"
    AttachmentList:
      description: Attachment list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AttachmentListEnvelope"
    Attachment:
      description: Attachment resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AttachmentEnvelope"
    QueueStats:
      description: Queue stats envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/QueueStatsEnvelope"
    Backpressure:
      description: SMTP backpressure state envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BackpressureEnvelope"
    QuotaUsageList:
      description: Quota usage pressure list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/QuotaUsageListEnvelope"
    DeliveryAttempts:
      description: Delivery attempts envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeliveryAttemptsEnvelope"
    SuppressionList:
      description: Suppression list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuppressionListEnvelope"
    TrustedRelayList:
      description: Trusted relay list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TrustedRelayListEnvelope"
    TrustedRelay:
      description: Trusted relay resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TrustedRelayEnvelope"
    DeliveryRouteList:
      description: Delivery route list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeliveryRouteListEnvelope"
    DeliveryRoute:
      description: Delivery route resource envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeliveryRouteEnvelope"
    DeliveryRouteResolution:
      description: Delivery route resolution envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeliveryRouteResolutionEnvelope"
    DKIMKeyList:
      description: DKIM key list envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DKIMKeyListEnvelope"
    DomainList:
      description: Domain list envelope
      content:
        application/json:
          schema:
