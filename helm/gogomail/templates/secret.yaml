{{/*
In production, manage this Secret with an external secret manager
(e.g. Sealed Secrets, External Secrets Operator, Vault Agent Injector).
The values below are taken from values.secrets and base64-encoded automatically
by Kubernetes when using the `data` field with Helm's b64enc function.

To use an external secret manager, set values.secrets to {} and create
the Secret named "<release>-secrets" via your external tooling before install.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gogomail.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gogomail.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
{{- include "gogomail.requireNotChangeme" (dict "name" "GOGOMAIL_DM_MASTER_KEY" "value" .Values.secrets.GOGOMAIL_DM_MASTER_KEY) }}
{{- include "gogomail.requireNotChangeme" (dict "name" "GOGOMAIL_AUTH_JWT_SECRET" "value" .Values.secrets.GOGOMAIL_AUTH_JWT_SECRET) }}
{{- include "gogomail.requireNotChangeme" (dict "name" "GOGOMAIL_ADMIN_TOKEN" "value" .Values.secrets.GOGOMAIL_ADMIN_TOKEN) }}
data:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
