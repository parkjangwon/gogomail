# Sentinel configuration for redis-sentinel-1 (medium deployment)
port 26379
dir /tmp
logfile ""

# Master monitoring
sentinel monitor mymaster redis-master 6379 2

# Sentinel authentication (if master requires auth)
# sentinel auth-user mymaster default
# sentinel auth-pass mymaster changeme

# Timeouts
sentinel down-after-milliseconds mymaster 30000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 180000

# Notification scripts (optional)
# sentinel notification-script mymaster /path/to/notification.sh
# sentinel client-reconfig-script mymaster /path/to/reconfig.sh

# Sentinel bind address
bind redis-sentinel-1

# Protected mode
protected-mode no
