# Prometheus config for monitoring overlay.
# Scrapes backend:9091/metrics and edge-mta:9091/metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: gogomail

scrape_configs:
  - job_name: gogomail-backend
    static_configs:
      - targets: ["backend:9091"]
    metrics_path: /metrics

  - job_name: gogomail-edge-mta
    static_configs:
      - targets: ["edge-mta:9091"]
    metrics_path: /metrics
