upstream gogomail_backend {
  server backend-1:8080;
  server backend-2:8080;

  # Health check
  keepalive 32;
}

# Strip internal X-Gogomail-* identity headers that clients must not be able to spoof.
# The backend sets these headers from JWT claims after authentication; any value
# sent by an external client must be cleared before the request reaches the app.
map $http_host $empty_value {
  default "";
}

server {
  listen 80;
  server_name _;

  # Redirect HTTP to HTTPS.
  # Development: comment out the return line below.
  # Production: uncomment the return line.
  # return 301 https://$server_name$request_uri;

  location /health {
    proxy_pass http://gogomail_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    access_log off;
  }

  location / {
    proxy_pass http://gogomail_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Strip internal API-metering identity headers so external clients cannot
    # spoof tenant attribution or billing records.
    proxy_set_header X-Gogomail-Tenant-ID    "";
    proxy_set_header X-Gogomail-Company-ID   "";
    proxy_set_header X-Gogomail-Domain-ID    "";
    proxy_set_header X-Gogomail-API-Key-ID   "";
    proxy_set_header X-Gogomail-Principal-ID "";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering for streaming responses
    proxy_buffering off;
  }
}

server {
  listen 443 ssl http2;
  server_name _;

  # SSL configuration — replace cert/key paths with real certificates
  ssl_certificate /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache shared:MozSSL:10m;
  ssl_session_tickets off;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  location /health {
    proxy_pass http://gogomail_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    access_log off;
  }

  location / {
    proxy_pass http://gogomail_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Strip internal API-metering identity headers so external clients cannot
    # spoof tenant attribution or billing records.
    proxy_set_header X-Gogomail-Tenant-ID    "";
    proxy_set_header X-Gogomail-Company-ID   "";
    proxy_set_header X-Gogomail-Domain-ID    "";
    proxy_set_header X-Gogomail-API-Key-ID   "";
    proxy_set_header X-Gogomail-Principal-ID "";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering for streaming responses
    proxy_buffering off;
  }
}
