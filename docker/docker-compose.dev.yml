services:
  # PostgreSQL - Development
  postgres:
    image: postgres:16-alpine
    container_name: gogomail-postgres-dev
    environment:
      POSTGRES_DB: gogomail
      POSTGRES_USER: gogomail
      POSTGRES_PASSWORD: gogomail
      POSTGRES_LOG_STATEMENT: all
    ports:
      - "${GOGOMAIL_DEV_POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gogomail -d gogomail"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - gogomail-dev

  # Redis - Development
  redis:
    image: redis:7-alpine
    container_name: gogomail-redis-dev
    ports:
      - "${GOGOMAIL_DEV_REDIS_PORT:-16379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - gogomail-dev

  # MinIO - Development
  minio:
    image: minio/minio:latest
    container_name: gogomail-minio-dev
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: gogomail
      MINIO_ROOT_PASSWORD: gogomail123
      MINIO_BROWSER_REDIRECT_URL: http://localhost:19001
    ports:
      - "${GOGOMAIL_DEV_MINIO_PORT:-19000}:9000"
      - "${GOGOMAIL_DEV_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - gogomail-dev

  # MinIO Init - Create buckets
  minio-init:
    image: minio/mc:latest
    container_name: gogomail-minio-init-dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 gogomail gogomail123
        mc mb --ignore-existing local/gogomail
        mc anonymous set none local/gogomail
    restart: "no"
    networks:
      - gogomail-dev

  # Go Backend - Development
  clamav:
    image: clamav/clamav-debian:stable
    container_name: gogomail-clamav-dev
    ports:
      - "${GOGOMAIL_DEV_CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping=1 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - gogomail-dev
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 768M

  backend:
    image: golang:1.25-alpine
    container_name: gogomail-backend-dev
    working_dir: /app
    volumes:
      - ..:/app
    ports:
      - "${GOGOMAIL_DEV_BACKEND_PORT:-8080}:8080"
    environment:
      CGO_ENABLED: 0
      GOFLAGS: -v
      GOGOMAIL_AUTH_JWT_SECRET: gogomail-dev-jwt-secret-at-least-32-bytes
      GOGOMAIL_ADMIN_TOKEN: change-this-admin-token
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: gogomail
      POSTGRES_PASSWORD: gogomail
      POSTGRES_DB: gogomail
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: gogomail
      MINIO_SECRET_KEY: gogomail123
    command: sh -c "go install github.com/air-verse/air@v1.61.7 && air -c /app/.air.dev.toml"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - gogomail-dev


  event-worker:
    image: golang:1.25-alpine
    container_name: gogomail-event-worker-dev
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      CGO_ENABLED: 0
      GOFLAGS: -v
    command: sh -c "go run ./cmd/gogomail --config /app/configs/config.dev.yaml --mode event-worker"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - gogomail-dev

  outbox-relay:
    image: golang:1.25-alpine
    container_name: gogomail-outbox-relay-dev
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      CGO_ENABLED: 0
      GOFLAGS: -v
    command: sh -c "go run ./cmd/gogomail --config /app/configs/config.dev.yaml --mode outbox-relay"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gogomail-dev

  delivery-worker:
    image: golang:1.25-alpine
    container_name: gogomail-delivery-worker-dev
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      CGO_ENABLED: 0
      GOFLAGS: -v
    command: sh -c "go run ./cmd/gogomail --config /app/configs/config.dev.yaml --mode delivery-worker"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - gogomail-dev

  # Edge MTA — receives inbound SMTP on :2525, writes to outbox for delivery-worker
  edge-mta:
    image: golang:1.25-alpine
    container_name: gogomail-edge-mta-dev
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      CGO_ENABLED: 0
      GOFLAGS: -v
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: gogomail
      POSTGRES_PASSWORD: gogomail
      POSTGRES_DB: gogomail
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: gogomail
      MINIO_SECRET_KEY: gogomail123
    ports:
      - "${GOGOMAIL_DEV_SMTP_PORT:-2525}:2525"
    command: sh -c "go run ./cmd/gogomail --config /app/configs/config.dev.yaml --mode edge-mta"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - gogomail-dev

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  clamav-data:
    driver: local

networks:
  gogomail-dev:
    driver: bridge
