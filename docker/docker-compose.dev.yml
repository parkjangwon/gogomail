# GoGoMail — Full development stack
#
# Includes: core infra + all application services + OpenSearch + monitoring.
#
# Usage:
#   docker compose -f docker/docker-compose.dev.yml up -d
#   docker compose -f docker/docker-compose.dev.yml logs -f backend
#   docker compose -f docker/docker-compose.dev.yml down -v   # wipe volumes
#
# Ports (host):
#   8080  — backend HTTP API + admin console
#   2525  — edge-MTA SMTP
#   9200  — OpenSearch REST (dev inspection)
#   9090  — Prometheus
#   3100  — Loki
#   3000  — Grafana  (admin / admin)
#  15432  — Postgres  (direct access)
#  16379  — Redis
#  19000  — MinIO S3 API
#  19001  — MinIO console

# ── Shared fragments ──────────────────────────────────────────────────────────
#
# All Go application services share a common base: mounted source tree,
# single network, and the two OpenSearch env vars required by config.dev.yaml
# (config validation fails when search_index_backend=opensearch and the
# endpoint env var is unset).
x-gogomail-app: &gogomail-app
  image: golang:1.25-alpine
  working_dir: /app
  volumes:
    - ..:/app
  environment: &gogomail-env
    CGO_ENABLED: 0
    GOFLAGS: -v
    GOGOMAIL_SEARCH_INDEX_OPENSEARCH_ENDPOINT: http://opensearch:9200
    GOGOMAIL_SEARCH_INDEX_OPENSEARCH_INDEX: gogomail-messages
  networks:
    - gogomail-dev

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gogomail-postgres-dev
    environment:
      POSTGRES_DB: gogomail
      POSTGRES_USER: gogomail
      POSTGRES_PASSWORD: gogomail
      POSTGRES_LOG_STATEMENT: all
    ports:
      - "${GOGOMAIL_DEV_POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gogomail -d gogomail"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - gogomail-dev

  redis:
    image: redis:7-alpine
    container_name: gogomail-redis-dev
    ports:
      - "${GOGOMAIL_DEV_REDIS_PORT:-16379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - gogomail-dev

  minio:
    image: minio/minio:latest
    container_name: gogomail-minio-dev
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: gogomail
      MINIO_ROOT_PASSWORD: gogomail123
      MINIO_BROWSER_REDIRECT_URL: http://localhost:19001
    ports:
      - "${GOGOMAIL_DEV_MINIO_PORT:-19000}:9000"
      - "${GOGOMAIL_DEV_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - gogomail-dev

  minio-init:
    image: minio/mc:latest
    container_name: gogomail-minio-init-dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 gogomail gogomail123
        mc mb --ignore-existing local/gogomail
        mc anonymous set none local/gogomail
    restart: "no"
    networks:
      - gogomail-dev

  clamav:
    image: clamav/clamav-debian:stable
    container_name: gogomail-clamav-dev
    ports:
      - "${GOGOMAIL_DEV_CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping=1 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 768M
    networks:
      - gogomail-dev

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: gogomail-opensearch-dev
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
    ports:
      - "${GOGOMAIL_DEV_OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - gogomail-dev

  # ── Application services ────────────────────────────────────────────────────
  backend:
    <<: *gogomail-app
    container_name: gogomail-backend-dev
    ports:
      - "${GOGOMAIL_DEV_BACKEND_PORT:-8080}:8080"
    environment:
      <<: *gogomail-env
      GOGOMAIL_AUTH_JWT_SECRET: gogomail-dev-jwt-secret-at-least-32-bytes
      GOGOMAIL_ADMIN_TOKEN: change-this-admin-token
    command: sh -c "go install github.com/air-verse/air@v1.61.7 && air -c /app/.air.dev.toml"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  event-worker:
    <<: *gogomail-app
    container_name: gogomail-event-worker-dev
    command: sh -c "go run ./cmd/gogomail --config /app/configs/config.dev.yaml --mode event-worker"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  outbox-relay:
    <<: *gogomail-app
    container_name: gogomail-outbox-relay-dev
    command: sh -c "go run ./cmd/gogomail --config /app/configs/config.dev.yaml --mode outbox-relay"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  delivery-worker:
    <<: *gogomail-app
    container_name: gogomail-delivery-worker-dev
    command: sh -c "go run ./cmd/gogomail --config /app/configs/config.dev.yaml --mode delivery-worker"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  edge-mta:
    <<: *gogomail-app
    container_name: gogomail-edge-mta-dev
    ports:
      - "${GOGOMAIL_DEV_SMTP_PORT:-2525}:2525"
    command: sh -c "go run ./cmd/gogomail --config /app/configs/config.dev.yaml --mode edge-mta"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  search-index-worker:
    <<: *gogomail-app
    container_name: gogomail-search-index-worker-dev
    environment:
      <<: *gogomail-env
      GOGOMAIL_SEARCH_INDEX_OPENSEARCH_BOOTSTRAP: "true"
    command: sh -c "go run ./cmd/gogomail --config /app/configs/config.dev.yaml --mode search-index-worker"
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Monitoring ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: gogomail-prometheus-dev
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus-monitoring.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    networks:
      - gogomail-dev

  loki:
    image: grafana/loki:3.1.0
    container_name: gogomail-loki-dev
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - gogomail-dev

  promtail:
    image: grafana/promtail:3.1.0
    container_name: gogomail-promtail-dev
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/var/lib/promtail
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - gogomail-dev

  grafana:
    image: grafana/grafana:11.1.0
    container_name: gogomail-grafana-dev
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - gogomail-dev

volumes:
  postgres-data:
  redis-data:
  minio-data:
  clamav-data:
  opensearch-data:
  prometheus-data:
  loki-data:
  grafana-data:
  promtail-positions:

networks:
  gogomail-dev:
    driver: bridge
