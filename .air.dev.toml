root = "."
tmp_dir = "/tmp/gogomail-air"

[build]
cmd = "go build -o /tmp/gogomail-air/gogomail ./cmd/gogomail"
bin = "/tmp/gogomail-air/gogomail -mode all-in-one -migrate -config /app/configs/config.dev.yaml"
delay = 1000
exclude_dir = [
  ".git",
  ".omc",
  ".omx",
  ".openchrome",
  ".sisyphus",
  "apps",
  "bin",
  "clients",
  "docs",
  "node_modules",
  "var"
]
exclude_file = ["gogomail"]
exclude_regex = ["_test\\.go"]
include_ext = ["go", "mod", "sum", "sql", "yaml", "yml"]
kill_delay = "500ms"
send_interrupt = true
stop_on_error = true

[log]
time = true

[misc]
clean_on_exit = true
