apiVersion: v1
kind: Secret
metadata:
  name: gogomail-secrets
  namespace: gogomail
  labels:
    app.kubernetes.io/name: gogomail
type: Opaque
# In production, manage this Secret with an external secret manager
# (e.g. Sealed Secrets, External Secrets Operator, Vault Agent Injector).
# The values below are base64-encoded placeholders — replace all of them.
stringData:
  # PostgreSQL connection URL
  # Example: postgres://gogomail:password@postgres:5432/gogomail?sslmode=require
  GOGOMAIL_DATABASE_URL: "postgres://gogomail:CHANGEME@postgres:5432/gogomail?sslmode=require"

  # JWT signing secret (min 32 bytes, random)
  GOGOMAIL_AUTH_JWT_SECRET: "CHANGEME_32_BYTES_MINIMUM_RANDOM_STRING"

  # Admin API bearer token
  GOGOMAIL_ADMIN_TOKEN: "CHANGEME_ADMIN_TOKEN"

  # DM end-to-end encryption master key (32-byte hex, e.g. openssl rand -hex 32)
  GOGOMAIL_DM_MASTER_KEY: "CHANGEME_DM_MASTER_KEY_HEX"

  # S3-compatible object storage credentials
  GOGOMAIL_STORAGE_S3_ENDPOINT: "https://s3.amazonaws.com"
  GOGOMAIL_STORAGE_S3_BUCKET: "gogomail-attachments"
  GOGOMAIL_STORAGE_S3_ACCESS_KEY_ID: "CHANGEME_ACCESS_KEY"
  GOGOMAIL_STORAGE_S3_SECRET_ACCESS_KEY: "CHANGEME_SECRET_KEY"
