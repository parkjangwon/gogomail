apiVersion: v1
kind: Service
metadata:
  name: gogomail
  namespace: gogomail
  labels:
    app.kubernetes.io/name: gogomail
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gogomail
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: smtp
      port: 25
      targetPort: smtp
      protocol: TCP
    - name: smtp-submission
      port: 587
      targetPort: smtp
      protocol: TCP
    - name: imap
      port: 143
      targetPort: imap
      protocol: TCP
---
# Headless service for IMAP/SMTP clients that require sticky sessions
# or direct pod addressing (e.g. IDLE push notifications).
apiVersion: v1
kind: Service
metadata:
  name: gogomail-headless
  namespace: gogomail
  labels:
    app.kubernetes.io/name: gogomail
    app.kubernetes.io/component: server
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: gogomail
    app.kubernetes.io/component: server
  ports:
    - name: imap
      port: 1143
      targetPort: imap
      protocol: TCP
