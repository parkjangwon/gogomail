apiVersion: apps/v1
kind: Deployment
metadata:
  name: gogomail
  namespace: gogomail
  labels:
    app.kubernetes.io/name: gogomail
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gogomail
      app.kubernetes.io/component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gogomail
        app.kubernetes.io/component: server
      annotations:
        # Force a rollout when the ConfigMap or Secret changes.
        checksum/configmap: ""  # filled by Helm or external tooling
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: gogomail
          image: ghcr.io/gogomail/gogomail:latest
          imagePullPolicy: IfNotPresent
          args: ["api"]   # run the HTTP API mode; adjust per mode (smtp, imap, …)
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: smtp
              containerPort: 2525
              protocol: TCP
            - name: imap
              containerPort: 1143
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gogomail-config
            - secretRef:
                name: gogomail-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
