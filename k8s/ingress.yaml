apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gogomail
  namespace: gogomail
  labels:
    app.kubernetes.io/name: gogomail
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Strip internal X-Gogomail-* identity headers before forwarding to the backend.
    # External clients must not be able to spoof tenant attribution or billing records.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Gogomail-Tenant-ID    "";
      proxy_set_header X-Gogomail-Company-ID   "";
      proxy_set_header X-Gogomail-Domain-ID    "";
      proxy_set_header X-Gogomail-API-Key-ID   "";
      proxy_set_header X-Gogomail-Principal-ID "";
    # Uncomment to enable TLS via cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - mail.example.com
  #     secretName: gogomail-tls
  rules:
    - host: mail.example.com   # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gogomail
                port:
                  name: http
