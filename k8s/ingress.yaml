apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gogomail
  namespace: gogomail
  labels:
    app.kubernetes.io/name: gogomail
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Uncomment to enable TLS via cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - mail.example.com
  #     secretName: gogomail-tls
  rules:
    - host: mail.example.com   # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gogomail
                port:
                  name: http
