# Local MinIO storage profile for docker/docker-compose.dev.yml.
storage_backend: minio
storage_backend_compat_labels: []
storage_s3_endpoint: http://localhost:19000
storage_s3_region: us-east-1
storage_s3_bucket: gogomail
storage_s3_prefix: ""
storage_s3_access_key_id: gogomail
storage_s3_secret_access_key: gogomail123
storage_s3_session_token: ""
storage_s3_force_path_style: true
storage_s3_ca_cert_file: ""
storage_s3_insecure_skip_verify: false
storage_root: var/mailstore
