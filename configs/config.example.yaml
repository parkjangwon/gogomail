environment: development
http_addr: :8080
smtp_addr: :2525
submission_addr: :2587
submission_smtps_addr: ""
smtp_domain: localhost
smtp_auth_verification_enabled: false
smtp_authserv_id: localhost
smtp_dmarc_enforcement: monitor
smtp_max_dkim_verifications: 8
delivery_throttle_enabled: false
delivery_default_concurrency: 0
delivery_farm_concurrency: general=50,bulk=10,batch=5,transactional=100
delivery_domain_concurrency: example.com=5
delivery_smarthost: ""
delivery_smarthost_port: 0
delivery_smarthost_tls_mode: ""
delivery_smarthost_implicit_tls: false
delivery_smarthost_username: ""
metrics_backend: none
push_notification_backend: none
push_notification_consumer_group: gogomail.push-notification-worker
push_notification_consumer_name: push-notification-worker-1
push_notification_consumer_count: 50
push_notification_consumer_block: 1s
api_metering_backend: none
api_metering_timeout: 100ms
api_metering_aggregate_backend: disabled
api_metering_stream: api.event
api_metering_consumer_group: gogomail.api-metering-worker
api_metering_consumer_name: api-metering-worker-1
api_metering_consumer_count: 100
api_metering_consumer_block: 1s
search_index_backend: disabled
search_index_max_body_bytes: 1048576
database_url: postgres://gogomail:gogomail@localhost:15432/gogomail?sslmode=disable
redis_addr: localhost:16379
storage_backend: local
migration_dir: migrations
mailstore_root: var/mailstore
local_recipients:
  - admin@example.com
