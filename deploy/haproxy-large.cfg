global
  log stdout local0
  log stdout local1 notice
  chroot /var/lib/haproxy
  stats socket /run/haproxy/admin.sock mode 660 level admin
  stats timeout 30s
  user haproxy
  group haproxy
  daemon
  maxconn 4096

  # SSL/TLS configuration
  # tune.ssl.default-dh-param 2048

defaults
  log     global
  mode    http
  option  httplog
  option  dontlognull
  timeout connect 5000
  timeout client  50000
  timeout server  50000
  errorfile 400 /usr/local/etc/haproxy/errors/400.http
  errorfile 403 /usr/local/etc/haproxy/errors/403.http
  errorfile 408 /usr/local/etc/haproxy/errors/408.http
  errorfile 500 /usr/local/etc/haproxy/errors/500.http
  errorfile 502 /usr/local/etc/haproxy/errors/502.http
  errorfile 503 /usr/local/etc/haproxy/errors/503.http
  errorfile 504 /usr/local/etc/haproxy/errors/504.http

# GoGoMail Backend Load Balancing
frontend gogomail_frontend
  bind *:80
  # Bind HTTPS (requires certificate configuration)
  # bind *:443 ssl crt /etc/haproxy/certs/gogomail.pem

  mode http
  option httpclose
  option httplog

  # Health check path
  acl is_health path /health
  use_backend gogomail_health if is_health

  # Default backend
  default_backend gogomail_backend

backend gogomail_backend
  mode http
  balance roundrobin
  option httpchk GET /health HTTP/1.1\r\nHost:\ gogomail

  # Backend servers with health checks
  server backend-1 backend-1:8080 check inter 5s fall 3 rise 2
  server backend-2 backend-2:8080 check inter 5s fall 3 rise 2
  server backend-3 backend-3:8080 check inter 5s fall 3 rise 2

  # Connection settings
  http-reuse safe
  timeout http-keep-alive 5s

backend gogomail_health
  mode http
  balance roundrobin
  option httpchk GET /health HTTP/1.1\r\nHost:\ gogomail

  server backend-1 backend-1:8080 check inter 5s fall 1 rise 1
  server backend-2 backend-2:8080 check inter 5s fall 1 rise 1
  server backend-3 backend-3:8080 check inter 5s fall 1 rise 1

# MinIO Object Storage Load Balancing
frontend minio_frontend
  bind *:9000
  mode http
  option httplog
  default_backend minio_backend

backend minio_backend
  mode http
  balance leastconn
  option httpchk GET /minio/health/live HTTP/1.1\r\nHost:\ minio

  # MinIO nodes
  server minio-1 minio-1:9000 check inter 10s fall 3 rise 2
  server minio-2 minio-2:9000 check inter 10s fall 3 rise 2
  server minio-3 minio-3:9000 check inter 10s fall 3 rise 2
  server minio-4 minio-4:9000 check inter 10s fall 3 rise 2
  server minio-5 minio-5:9000 check inter 10s fall 3 rise 2
  server minio-6 minio-6:9000 check inter 10s fall 3 rise 2

  timeout http-keep-alive 5s

# MinIO Console Load Balancing
frontend minio_console_frontend
  bind *:9001
  mode http
  default_backend minio_console_backend

backend minio_console_backend
  mode http
  balance roundrobin

  server minio-1 minio-1:9001 check inter 10s fall 3 rise 2
  server minio-2 minio-2:9001 check inter 10s fall 3 rise 2
  server minio-3 minio-3:9001 check inter 10s fall 3 rise 2

# Statistics endpoint
frontend stats
  bind *:8404
  mode http
  stats enable
  stats uri /stats
  stats refresh 10s
  stats admin if TRUE
