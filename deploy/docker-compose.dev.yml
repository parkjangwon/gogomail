services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gogomail
      POSTGRES_USER: gogomail
      POSTGRES_PASSWORD: gogomail
    ports:
      - "${GOGOMAIL_DEV_POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gogomail -d gogomail"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${GOGOMAIL_DEV_REDIS_PORT:-16379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: gogomail
      MINIO_ROOT_PASSWORD: gogomail123
    ports:
      - "${GOGOMAIL_DEV_MINIO_PORT:-19000}:9000"
      - "${GOGOMAIL_DEV_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 gogomail gogomail123
        mc mb --ignore-existing local/gogomail
        mc anonymous set none local/gogomail
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  minio-data:
