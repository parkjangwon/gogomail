apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    password: ""
    user: ""
    database: ""
    basicAuth: false
    isDefault: true
    jsonData:
      timeInterval: 15s
    editable: true

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    orgId: 1
    url: http://elasticsearch:9200
    password: ""
    user: ""
    database: ".kibana"
    basicAuth: false
    isDefault: false
    jsonData:
      esVersion: "8.0.0"
      logMessageField: message
      logLevelField: level
      timeField: timestamp
    editable: true

  - name: AlertManager
    type: alertmanager
    access: proxy
    orgId: 1
    url: http://alertmanager:9093
    password: ""
    user: ""
    basicAuth: false
    isDefault: false
    jsonData: {}
    editable: true
